services:
  brainycat:
    build: .
    container_name: brainycat
    restart: unless-stopped
    networks:
      - web
      - db
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - brainycat-data:/data
    entrypoint: >
      sh -c "for i in 1 2 3 4 5; do alembic upgrade head && break || sleep 3; done;
             uvicorn brainycat.web:app --host 0.0.0.0 --port 8000"

volumes:
  brainycat-data:

networks:
  web:
    external: true
  db:
    external: true
