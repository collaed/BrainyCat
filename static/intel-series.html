<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BrainyCat — Series</title>
<style>:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--success:#22c55e;--danger:#ef4444}*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--bg);color:var(--text)}header{background:var(--surface);padding:.8rem 1.5rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border)}header a{color:var(--muted);text-decoration:none}header h2{flex:1}.container{max-width:900px;margin:0 auto;padding:1.5rem}.card{background:var(--surface);border-radius:8px;padding:.8rem 1rem;margin-bottom:.5rem;position:relative}.card .title{font-weight:600;font-size:.9rem}.card .detail{font-size:.82rem;color:var(--muted);margin-top:.2rem}.card .actions{margin-top:.5rem;display:flex;gap:.4rem;flex-wrap:wrap}.card .actions button{padding:.3rem .6rem;border-radius:5px;border:none;cursor:pointer;font-size:.78rem;color:#fff}.ba{background:var(--success)}.bd{background:var(--danger)}.conf{position:absolute;top:.6rem;right:.8rem;font-size:.72rem;padding:.15rem .45rem;border-radius:4px;font-weight:600;background:#854d0e;color:#fbbf24}.edit-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.25rem .4rem;border-radius:4px;font-size:.82rem;width:180px}.empty{color:var(--muted);font-style:italic;padding:2rem;text-align:center}</style></head><body>
<header><a href="intelligence.html">← Intelligence</a><h2>📚 Series Detection</h2></header>
<div class="container" id="list">Loading...</div>
<script src="api.js"></script>
<script>
async function load(){
    const items=await BC.get('/intelligence/series-gaps');
    if(!items.length){document.getElementById('list').innerHTML='<div class="empty">No series patterns found</div>';return;}
    document.getElementById('list').innerHTML=items.map((s,i)=>{
        const books=s.books||[];const ids=books.map(b=>b.id);
        return `<div class="card"><span class="conf">${s.confidence}%</span><div class="title"><input class="edit-input" value="${s.series}" id="sn-${i}"> ${s.author?'<span style="color:var(--muted)">by '+s.author+'</span>':''}</div><div class="detail">${books.map(b=>'• '+b.title).join('<br>')}</div><div class="actions"><button class="ba" onclick="accept(document.getElementById('sn-${i}').value,${JSON.stringify(ids)},this)">✓ Create</button><button class="bd" onclick="this.closest('.card').remove()">✕</button></div></div>`;
    }).join('');
}
async function accept(name,ids,btn){btn.disabled=true;btn.textContent='⏳';await BC.post('/intelligence/apply-series',{series_name:name,book_ids:ids});btn.closest('.card').innerHTML=`<div style="color:var(--success);padding:.3rem">✅ Created "${name}"</div>`;setTimeout(()=>btn.closest('.card')?.remove(),2000);}
load();
</script></body></html>
