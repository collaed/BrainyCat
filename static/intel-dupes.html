<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BrainyCat — Duplicates</title>
<style>:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--success:#22c55e;--danger:#ef4444}*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--bg);color:var(--text)}header{background:var(--surface);padding:.8rem 1.5rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border)}header a{color:var(--muted);text-decoration:none}header h2{flex:1}.container{max-width:900px;margin:0 auto;padding:1.5rem}.card{background:var(--surface);border-radius:8px;padding:.8rem 1rem;margin-bottom:.5rem}.card .title{font-weight:600;font-size:.9rem}.card .detail{font-size:.82rem;color:var(--muted);margin-top:.2rem}.card .actions{margin-top:.5rem;display:flex;gap:.4rem}.card .actions button{padding:.3rem .6rem;border-radius:5px;border:none;cursor:pointer;font-size:.78rem;color:#fff}.ba{background:var(--success)}.bl{background:var(--accent)}.bd{background:var(--danger)}.tag{display:inline-block;font-size:.65rem;padding:.1rem .3rem;border-radius:3px;background:#164e63;color:#67e8f9;margin-right:.2rem}.empty{color:var(--muted);font-style:italic;padding:2rem;text-align:center}</style></head><body>
<header><a href="intelligence.html">← Intelligence</a><h2>🔄 Title Duplicates</h2></header>
<div class="container" id="list">Loading...</div>
<script src="api.js"></script>
<script>
async function load(){
    const items=await BC.get('/intelligence/duplicates');
    if(!items.length){document.getElementById('list').innerHTML='<div class="empty">No duplicates ✓</div>';return;}
    document.getElementById('list').innerHTML=items.slice(0,100).map(d=>`<div class="card"><div class="title">${d.title_a} ${(d.formats_a||[]).map(f=>`<span class="tag">${f}</span>`).join('')}</div><div class="title" style="margin-top:.2rem">↔ ${d.title_b} ${(d.formats_b||[]).map(f=>`<span class="tag">${f}</span>`).join('')}</div><div class="detail">${d.score}% · ${(d.signals||[]).join(' · ')}</div><div class="actions"><button class="bl" onclick="link('${d.book_a}','${d.book_b}','edition',this)">🔗 Link</button><button class="bd" onclick="this.closest('.card').remove()">✕</button></div></div>`).join('');
}
async function link(a,b,t,btn){btn.disabled=true;btn.textContent='⏳';await BC.post('/intelligence/link-duplicate',{book_a_id:a,book_b_id:b,link_type:t});btn.closest('.card').innerHTML='<div style="color:var(--success);padding:.3rem">✅ Linked</div>';setTimeout(()=>btn.closest('.card')?.remove(),2000);}
load();
</script></body></html>
