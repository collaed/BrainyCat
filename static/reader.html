<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BrainyCat — Reader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a2e;color:#e2e8f0;font-family:system-ui}
#toolbar{background:#16213e;padding:.5rem 1rem;display:flex;gap:.8rem;align-items:center;border-bottom:1px solid #334155;z-index:20;position:relative}
#toolbar a{color:#94a3b8;text-decoration:none}
#toolbar .title{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.9rem}
#toolbar button,#toolbar select{padding:.3rem .6rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;cursor:pointer;font-size:.8rem}
#viewer{height:calc(100vh - 45px);overflow:auto}
#toc{position:fixed;left:0;top:45px;width:280px;height:calc(100vh - 45px);background:#16213e;overflow-y:auto;transform:translateX(-100%);transition:transform .2s;z-index:10;padding:1rem;border-right:1px solid #334155}
#toc.open{transform:translateX(0)}
#toc h3{margin-bottom:.8rem;font-size:.9rem;color:#94a3b8}
#toc a{display:block;padding:.4rem 0;color:#94a3b8;text-decoration:none;font-size:.85rem}#toc a:hover{color:#e2e8f0}

.genre-margin{position:fixed;top:45px;width:6px;height:calc(100vh - 48px);z-index:15;opacity:0.6;transition:background-position 2s linear}
.genre-margin.left{left:0;border-right:1px solid rgba(255,255,255,0.05)}
.genre-margin.right{right:0;border-left:1px solid rgba(255,255,255,0.05)}
.genre-margin .strip{width:100%;height:300%;position:absolute;top:0;transition:top 0.5s ease}
.progress-bar{position:fixed;bottom:0;left:0;height:3px;background:#3b82f6;transition:width .3s;z-index:20}
#status{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:#1e293b;color:#94a3b8;padding:.4rem .8rem;border-radius:6px;font-size:.8rem;z-index:20}
</style></head><body>
<div id="toolbar">
<a href="index.html">← Library</a>
<button onclick="toggleToc()">☰</button>
<span class="title" id="book-title">Loading...</span>
<select id="theme" onchange="setTheme(this.value)"><option value="dark">Dark</option><option value="light">Light</option><option value="sepia">Sepia</option><option value="night">🌙 Night</option></select>
<button onclick="changeFontSize(-2)">A-</button>
<button onclick="changeFontSize(2)">A+</button>
<button onclick="prevPage()">◀</button>
<button onclick="nextPage()">▶</button>
<button onclick="toggleAutoScroll()" id="auto-scroll-btn" title="Auto-scroll">⏬</button>
<button id="sync-btn" style="display:none" onclick="switchToAudio()">🎧</button>
<span id="reading-speed" style="font-size:.7rem;color:#94a3b8;margin-left:auto"></span>
</div>
<div id="toc"><h3>Table of Contents</h3></div>

<div class="genre-margin left"><div class="strip" id="margin-left"></div></div>
<div class="genre-margin right"><div class="strip" id="margin-right"></div></div>
<div id="viewer"></div>
<div class="progress-bar" id="progress-bar"></div>

<!-- Dictionary popup -->
<div id="dict-popup" style="display:none;position:fixed;z-index:100;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:12px 16px;max-width:320px;box-shadow:0 8px 30px rgba(0,0,0,0.4);font-size:.85rem;color:#e2e8f0">
<div id="dict-word" style="font-weight:700;font-size:1rem;margin-bottom:6px;color:#3b82f6"></div>
<div id="dict-def" style="line-height:1.5"></div>
<div style="text-align:right;margin-top:8px"><button onclick="document.getElementById('dict-popup').style.display='none'" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:.8rem">✕ Close</button></div>
</div>

<!-- Night mode overlay (blue light filter) -->
<div id="night-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,140,0,0.08);pointer-events:none;z-index:50"></div>
<div id="status">Loading...</div>

<script src="api.js"></script>
<script>
const params = new URLSearchParams(location.search);
const bookId = params.get('id');
let book, rendition, fontSize = 18;
const statusEl = document.getElementById('status');

function log(msg) { statusEl.textContent = msg; console.log('[reader]', msg); }

async function init() {
    if (!bookId) { log('No book ID'); return; }
    log('Loading book data...');

    const data = await BC.get('/books/' + bookId);
    document.getElementById('book-title').textContent = data.title || 'Unknown';
    bookLang = data.language || '';

    const epubFile = (data.files || []).find(f => f.format === 'epub');
    const mobiFile = !epubFile && (data.files || []).find(f => ['mobi','azw3','azw','kfx'].includes(f.format));
    const pdfFile = !epubFile && !mobiFile && (data.files || []).find(f => f.format === 'pdf');
    // Set up genre margin strips
    const genre = detectGenre(data.title, data.description, []);
    setupMargins(genre);
    document.getElementById('book-title').title = 'Genre: ' + genre;

    // PDF viewer
    if (pdfFile) {
        return initPdfViewer(bookId, pdfFile);
    }

    if (!epubFile && mobiFile) {
        log('Converting ' + mobiFile.format.toUpperCase() + ' to EPUB...');
        try {
            const convResp = await fetch(API + '/books/' + bookId + '/convert/epub', {method:'POST', credentials:'same-origin'});
            if (convResp.ok) {
                const convData = await convResp.json();
                if (convData.file_id) {
                    log('Conversion done, reloading...');
                    location.reload();
                    return;
                }
            }
        } catch(e) {}
        log('No EPUB available and conversion failed');
        return;
    }
    if (!epubFile) { log('No EPUB file found'); return; }

    // Check for audio version
    if ((data.formats||[]).some(f => ['mp3','m4b','m4a'].includes(f))) {
        document.getElementById('sync-btn').style.display = '';
    }

    log('Downloading EPUB (' + (epubFile.file_size / 1024).toFixed(0) + ' KB)...');

    try {
        const resp = await fetch(API + '/books/' + bookId + '/file/' + epubFile.id, {credentials: 'same-origin'});
        if (!resp.ok) { log('Failed to fetch EPUB: HTTP ' + resp.status); return; }
        const arrayBuffer = await resp.arrayBuffer();
        log('Parsing EPUB...');

        book = ePub(arrayBuffer);
        rendition = book.renderTo('viewer', {
            width: '100%',
            height: '100%',
            spread: 'none',
            flow: 'scrolled-doc',
        });

        // Apply dark theme + image scaling
        rendition.themes.default({
            body: { background: '#1a1a2e !important', color: '#e2e8f0 !important', 'max-width': '800px !important', margin: '0 auto !important', padding: '1rem !important' },
            'p, div, span, h1, h2, h3, h4, h5, h6, li, a': { color: '#e2e8f0 !important' },
            'img': { 'max-width': '100% !important', height: 'auto !important', display: 'block !important', margin: '0 auto !important' },
            'svg': { 'max-width': '100% !important', height: 'auto !important' },
            'image': { 'max-width': '100% !important' },
        });
        rendition.themes.fontSize(fontSize + 'px');

        // Load saved progress
        const progress = await BC.get('/progress/' + bookId);
        if (progress && progress.position) {
            log('Resuming from saved position...');
            await rendition.display(progress.position);
        } else {
            await rendition.display();
        }
        log('');

        // Generate locations for accurate progress tracking (non-blocking)
        let locationsReady = false;
        book.locations.generate(1024).then(() => { locationsReady = true; });

        // Track progress on page turn
        rendition.on('relocated', loc => {
            const pct = locationsReady ? book.locations.percentageFromCfi(loc.start.cfi) * 100 : (loc.start.percentage || 0) * 100;
            document.getElementById('progress-bar').style.width = pct + '%';
            scrollMargins(pct);
            if (loc.start.cfi) {
                BC.put('/progress/' + bookId, { position: loc.start.cfi, percentage: pct });
            }
            statusEl.textContent = Math.round(pct) + '%';
            trackPageTurn();
        });

        // TOC
        const nav = await book.loaded.navigation;
        if (nav && nav.toc) {
            document.getElementById('toc').innerHTML = '<h3>Table of Contents</h3>' +
                nav.toc.map(ch => `<a href="#" onclick="goTo('${ch.href}');return false">${ch.label.trim()}</a>`).join('');
        }

        // Keyboard navigation
        rendition.on('keyup', handleKey);
        document.addEventListener('keyup', handleKey);

        // Click to turn pages
        rendition.on('click', (e) => {
            const w = rendition.manager?.container?.clientWidth || window.innerWidth;
            if (e.clientX < w * 0.3) rendition.prev();
            else if (e.clientX > w * 0.7) rendition.next();
        });

        // Setup dictionary (tap-to-define)
        setupDictionary();

    } catch (e) {
        log('Error: ' + e.message);
        console.error(e);
    }
}

function handleKey(e) {
    if (e.key === 'ArrowRight' || e.key === ' ') nextPage();
    else if (e.key === 'ArrowLeft') prevPage();
}
function nextPage() { if (rendition) rendition.next(); }
function prevPage() { if (rendition) rendition.prev(); }
function goTo(href) { if (rendition) { rendition.display(href); toggleToc(); } }
function toggleToc() { document.getElementById('toc').classList.toggle('open'); }
function changeFontSize(d) { fontSize = Math.max(12, Math.min(32, fontSize + d)); if (rendition) rendition.themes.fontSize(fontSize + 'px'); }
function setTheme(t) {
    const themes = {
        dark: { body: { background: '#1a1a2e !important', color: '#e2e8f0 !important' }, 'p,div,span,h1,h2,h3,h4,h5,h6,li,a': { color: '#e2e8f0 !important' } },
        light: { body: { background: '#ffffff !important', color: '#1a1a1a !important' }, 'p,div,span,h1,h2,h3,h4,h5,h6,li,a': { color: '#1a1a1a !important' } },
        sepia: { body: { background: '#f4ecd8 !important', color: '#5b4636 !important' }, 'p,div,span,h1,h2,h3,h4,h5,h6,li,a': { color: '#5b4636 !important' } },
        night: { body: { background: '#0a0a0a !important', color: '#c4a882 !important' }, 'p,div,span,h1,h2,h3,h4,h5,h6,li,a': { color: '#c4a882 !important' } },
    };
    if (rendition && themes[t]) rendition.themes.default(themes[t]);
    const bgs = { light: '#fff', sepia: '#f4ecd8', night: '#0a0a0a', dark: '#1a1a2e' };
    document.body.style.background = bgs[t] || '#1a1a2e';
    // Blue light filter for night mode
    document.getElementById('night-overlay').style.display = t === 'night' ? '' : 'none';
}
function switchToAudio() { location = 'player.html?id=' + bookId; }


// Genre color coding for margins
const GENRE_COLORS = {
    // Fiction — vertical gradient feel
    fiction:'#2563eb', romance:'#e11d48', thriller:'#0f172a', fantasy:'#7c3aed',
    'sci-fi':'#0891b2', horror:'#450a0a', mystery:'#854d0e', literary:'#065f46',
    erotica:'#9f1239',
    // Non-fiction — different pattern
    'non-fiction':'#dc2626', 'self-help':'#f59e0b', business:'#1d4ed8',
    science:'#059669', history:'#92400e', philosophy:'#4338ca',
    psychology:'#0d9488', technology:'#475569', cooking:'#ea580c', health:'#16a34a',
};

function detectGenre(title, desc, tags) {
    const text = (title + ' ' + (desc||'') + ' ' + (tags||[]).join(' ')).toLowerCase();
    const checks = [
        ['erotica', ['erotica','bdsm','femdom','erotic','kink','dominant']],
        ['romance', ['romance','love story','romantic']],
        ['thriller', ['thriller','suspense','crime']],
        ['fantasy', ['fantasy','magic','dragon','wizard']],
        ['sci-fi', ['sci-fi','science fiction','space','robot']],
        ['horror', ['horror','ghost','haunted']],
        ['mystery', ['mystery','murder']],
        ['self-help', ['self-help','self help','how to','guide','workbook']],
        ['business', ['business','entrepreneur','startup','marketing']],
        ['science', ['science','physics','biology','chemistry']],
        ['history', ['history','historical','war','ancient']],
        ['philosophy', ['philosophy','ethics']],
        ['psychology', ['psychology','mental','cognitive','therapy','anxiety']],
        ['technology', ['programming','software','computer','data science']],
        ['health', ['health','fitness','diet','yoga','meditation']],
    ];
    for (const [genre, kws] of checks) {
        if (kws.some(k => text.includes(k))) return genre;
    }
    return text.match(/novel|story|tales|fiction/) ? 'fiction' : 'non-fiction';
}

function setupMargins(genre) {
    const color = GENRE_COLORS[genre] || GENRE_COLORS['fiction'];
    const isNonFiction = ['non-fiction','self-help','business','science','history','philosophy','psychology','technology','cooking','health'].includes(genre);

    // Create gradient: for fiction, vertical flowing stripe; for non-fiction, horizontal dashes
    const leftEl = document.getElementById('margin-left');
    const rightEl = document.getElementById('margin-right');

    if (isNonFiction) {
        // Horizontal dashes pattern
        leftEl.style.background = `repeating-linear-gradient(0deg, ${color} 0px, ${color} 3px, transparent 3px, transparent 18px)`;
        rightEl.style.background = `repeating-linear-gradient(0deg, ${color} 0px, ${color} 3px, transparent 3px, transparent 18px)`;
    } else {
        // Solid color strip with subtle gradient
        leftEl.style.background = `linear-gradient(180deg, ${color}, ${color}dd, ${color}88, ${color}dd, ${color})`;
        rightEl.style.background = `linear-gradient(180deg, ${color}88, ${color}dd, ${color}, ${color}dd, ${color}88)`;
    }
}

function scrollMargins(pct) {
    // Slowly scroll the margin strips as reading progresses
    const offset = -(pct / 100) * 200; // 200% of strip height
    const leftEl = document.getElementById('margin-left');
    const rightEl = document.getElementById('margin-right');
    if (leftEl) leftEl.style.top = offset + '%';
    if (rightEl) rightEl.style.top = (offset * 0.7) + '%'; // slightly different speed for visual interest
}

init().catch(e => { log('Init error: ' + e.message); console.error(e); });
// ── Tap-to-define dictionary ──────────────────────────────────────────────
function setupDictionary() {
    if (!rendition) return;
    rendition.on('selected', async (cfiRange, contents) => {
        const text = rendition.getRange(cfiRange)?.toString().trim();
        if (!text || text.length < 2) return;
        const popup = document.getElementById('dict-popup');
        const wordEl = document.getElementById('dict-word');
        const defEl = document.getElementById('dict-def');
        popup.style.display = '';
        popup.style.top = '80px'; popup.style.left = '50%'; popup.style.transform = 'translateX(-50%)';

        const wordCount = text.split(/\s+/).length;

        if (wordCount === 1 && text.length <= 30) {
            // ── Single word: dictionary lookup ──
            wordEl.textContent = text;
            defEl.textContent = 'Looking up...';
            // Try book's language first, fall back to English
            const lang = (bookLang || 'en').slice(0, 2);
            let found = false;
            for (const tryLang of [lang, 'en'].filter((v,i,a) => a.indexOf(v)===i)) {
                try {
                    const resp = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/${tryLang}/${encodeURIComponent(text.toLowerCase())}`);
                    if (resp.ok) {
                        const data = await resp.json();
                        const meanings = data[0]?.meanings || [];
                        let html = '';
                        if (data[0]?.phonetic) html += `<div style="color:#64748b;margin-bottom:4px">${data[0].phonetic}</div>`;
                        for (const m of meanings.slice(0, 3)) {
                            html += `<div style="margin-bottom:6px"><em style="color:#94a3b8">${m.partOfSpeech}</em>`;
                            for (const d of m.definitions.slice(0, 2)) {
                                html += `<div style="margin-left:8px">• ${d.definition}</div>`;
                            }
                            html += '</div>';
                        }
                        defEl.innerHTML = html || 'No definition found';
                        found = true; break;
                    }
                } catch(e) {}
            }
            if (!found) defEl.textContent = 'No definition found for "' + text + '"';

        } else {
            // ── Multi-word: clipping + explain ──
            const short = text.length > 80 ? text.slice(0, 80) + '…' : text;
            wordEl.textContent = '📎 "' + short + '"';
            defEl.innerHTML = `
                <div style="margin-bottom:8px;display:flex;gap:6px;flex-wrap:wrap">
                    <button onclick="saveClipping()" style="padding:4px 10px;border-radius:4px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;cursor:pointer;font-size:.8rem">📋 Save clipping</button>
                    <button onclick="explainSelection()" style="padding:4px 10px;border-radius:4px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;cursor:pointer;font-size:.8rem">💡 Explain</button>
                    <button onclick="translateSelection()" style="padding:4px 10px;border-radius:4px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;cursor:pointer;font-size:.8rem">🌐 Translate</button>
                </div>
                <div id="explain-result"></div>`;
            window._selectedText = text;
            window._selectedCfi = cfiRange;
        }
    });
}

let bookLang = '';

async function saveClipping() {
    const text = window._selectedText;
    if (!text) return;
    try {
        await BC.post('/books/' + bookId + '/clippings', {text, cfi: window._selectedCfi, created_at: new Date().toISOString()});
        document.getElementById('explain-result').innerHTML = '<span style="color:#22c55e">✓ Saved</span>';
    } catch(e) {
        document.getElementById('explain-result').textContent = 'Save failed';
    }
}

async function explainSelection() {
    const text = window._selectedText;
    if (!text) return;
    const el = document.getElementById('explain-result');
    el.textContent = 'Thinking...';
    try {
        const resp = await BC.post('/ai/explain', {text, book_id: bookId});
        el.innerHTML = resp.explanation || resp.error || 'No explanation available';
    } catch(e) {
        // Graceful fallback without Intello
        el.textContent = 'AI explanation unavailable (Intello not connected)';
    }
}

async function translateSelection() {
    const text = window._selectedText;
    if (!text) return;
    const el = document.getElementById('explain-result');
    el.textContent = 'Translating...';
    try {
        const resp = await BC.post('/ai/translate', {text, book_id: bookId});
        el.innerHTML = resp.translation || resp.error || 'Translation unavailable';
    } catch(e) {
        el.textContent = 'Translation unavailable (Intello not connected)';
    }
}

// ── Auto-scroll ──────────────────────────────────────────────────────────
let autoScrollInterval = null;
function toggleAutoScroll() {
    const btn = document.getElementById('auto-scroll-btn');
    if (autoScrollInterval) {
        clearInterval(autoScrollInterval);
        autoScrollInterval = null;
        btn.style.background = '#0f172a';
        return;
    }
    btn.style.background = '#3b82f6';
    autoScrollInterval = setInterval(() => {
        if (rendition) rendition.next();
    }, 15000); // Turn page every 15 seconds
}

// ── Reading speed tracking ───────────────────────────────────────────────
let readingStart = Date.now(), pagesRead = 0;
function trackPageTurn() {
    pagesRead++;
    const elapsed = (Date.now() - readingStart) / 60000; // minutes
    if (elapsed > 1 && pagesRead > 2) {
        const ppm = (pagesRead / elapsed).toFixed(1);
        const totalPages = book?.locations?.total || 100;
        const remaining = totalPages - (rendition?.location?.start?.displayed?.page || 0);
        const eta = remaining > 0 ? Math.round(remaining / (pagesRead / elapsed)) : 0;
        const etaStr = eta > 60 ? `${Math.floor(eta/60)}h${eta%60}m` : `${eta}m`;
        document.getElementById('reading-speed').textContent = `${ppm} pg/min · ~${etaStr} left`;
    }
}


// Pinch-to-zoom → font size (tablet support)
let pinchStartDist = 0;
let pinchStartSize = fontSize;
document.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
        pinchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        pinchStartSize = fontSize;
    }
}, {passive: true});
document.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        const scale = dist / pinchStartDist;
        const newSize = Math.max(12, Math.min(32, Math.round(pinchStartSize * scale)));
        if (newSize !== fontSize) {
            fontSize = newSize;
            if (rendition) rendition.themes.fontSize(fontSize + 'px');
        }
    }
}, {passive: true});

// ── PDF Viewer ───────────────────────────────────────────────────────────
async function initPdfViewer(bookId, pdfFile) {
    log('Loading PDF...');
    const viewer = document.getElementById('viewer');
    viewer.style.overflow = 'auto';
    viewer.style.textAlign = 'center';
    viewer.style.padding = '0';

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const resp = await fetch(API + '/books/' + bookId + '/file/' + pdfFile.id, {credentials: 'same-origin'});
    const arrayBuffer = await resp.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
    const totalPages = pdf.numPages;
    log(`PDF: ${totalPages} pages`);

    // Load saved position
    let currentPage = 1;
    try {
        const progress = await BC.get('/progress/' + bookId);
        if (progress && progress.position) currentPage = parseInt(progress.position) || 1;
    } catch(e) {}

    // Render pages into canvases
    const container = document.createElement('div');
    container.id = 'pdf-pages';
    container.style.cssText = 'max-width:900px;margin:0 auto;';
    viewer.appendChild(container);

    const canvases = [];
    const scale = window.devicePixelRatio * 1.5;

    for (let i = 1; i <= totalPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({scale});
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        canvas.style.cssText = 'width:100%;height:auto;display:block;margin:0 auto 2px;';
        canvas.dataset.page = i;
        container.appendChild(canvas);
        canvases.push({canvas, page, viewport, rendered: false});
    }

    // Lazy render visible pages
    function renderVisible() {
        const viewTop = viewer.scrollTop - 500;
        const viewBot = viewer.scrollTop + viewer.clientHeight + 500;
        for (const c of canvases) {
            if (c.rendered) continue;
            const top = c.canvas.offsetTop;
            const bot = top + c.canvas.offsetHeight;
            if (bot > viewTop && top < viewBot) {
                c.rendered = true;
                c.page.render({canvasContext: c.canvas.getContext('2d'), viewport: c.viewport});
            }
        }
    }

    // Track scroll position for progress
    let saveTimer = null;
    viewer.addEventListener('scroll', () => {
        renderVisible();
        // Find current page
        const scrollMid = viewer.scrollTop + viewer.clientHeight / 2;
        for (const c of canvases) {
            if (c.canvas.offsetTop + c.canvas.offsetHeight > scrollMid) {
                const pg = parseInt(c.canvas.dataset.page);
                const pct = (pg / totalPages) * 100;
                document.getElementById('progress-bar').style.width = pct + '%';
                statusEl.textContent = `Page ${pg}/${totalPages} (${Math.round(pct)}%)`;
                scrollMargins(pct);
                clearTimeout(saveTimer);
                saveTimer = setTimeout(() => {
                    BC.put('/progress/' + bookId, {position: String(pg), percentage: pct});
                }, 1000);
                break;
            }
        }
    });

    // Scroll to saved page
    if (currentPage > 1 && canvases[currentPage - 1]) {
        // Render first few pages + target page area
        renderVisible();
        setTimeout(() => {
            canvases[currentPage - 1].canvas.scrollIntoView();
            renderVisible();
        }, 100);
    } else {
        renderVisible();
    }

    // Keyboard nav
    document.addEventListener('keyup', e => {
        if (e.key === 'ArrowRight') viewer.scrollBy(0, viewer.clientHeight * 0.9);
        else if (e.key === 'ArrowLeft') viewer.scrollBy(0, -viewer.clientHeight * 0.9);
    });

    log('');
}

</script></body></html>
