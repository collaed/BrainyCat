<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
function toggleBionic() {
  document.body.classList.toggle('bionic');
  const frames = document.querySelectorAll('iframe');
  frames.forEach(f => {
    try {
      const doc = f.contentDocument;
      if (doc) {
        let style = doc.getElementById('bionic-style');
        if (style) { style.remove(); return; }
        style = doc.createElement('style');
        style.id = 'bionic-style';
        style.textContent = '.bionic-word b { font-weight: 700; }';
        doc.head.appendChild(style);
        doc.querySelectorAll('p, li, td, span, div').forEach(el => {
          if (el.children.length === 0 && el.textContent.trim()) {
            el.innerHTML = el.textContent.replace(/\b(\w)(\w+)/g, '<b class="bionic-word">$1</b>$2');
          }
        });
      }
    } catch(e) {}
  });
}


function toggleRSVP() {
  let overlay = document.getElementById("rsvp-overlay");
  if (overlay) { overlay.remove(); return; }
  overlay = document.createElement("div");
  overlay.id = "rsvp-overlay";
  overlay.style.cssText = "position:fixed;inset:0;z-index:9999;background:var(--bg,#0f1115);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text,#e2e8f0)";
  overlay.innerHTML = `<div id="rsvp-word" style="font-size:3rem;font-weight:700;min-height:4rem;display:flex;align-items:center"></div>
    <div style="margin-top:2rem;display:flex;gap:1rem;align-items:center">
      <button onclick="rsvpSpeed(-50)">−</button>
      <span id="rsvp-wpm">300</span> WPM
      <button onclick="rsvpSpeed(50)">+</button>
      <button onclick="rsvpTogglePause()" id="rsvp-btn">⏸</button>
      <button onclick="document.getElementById('rsvp-overlay').remove()">✕</button>
    </div>`;
  document.body.appendChild(overlay);
  startRSVP();
}
let _rsvpWords=[], _rsvpIdx=0, _rsvpWpm=300, _rsvpTimer=null;
function startRSVP() {
  // Get text from current EPUB/PDF view
  const frames = document.querySelectorAll("iframe");
  let text = "";
  frames.forEach(f => { try { text += f.contentDocument.body.innerText + " "; } catch(e){} });
  if (!text) text = document.querySelector(".reader-content")?.innerText || "No text available";
  _rsvpWords = text.split(/\s+/).filter(w => w.length > 0);
  _rsvpIdx = 0;
  _rsvpWpm = 300;
  rsvpPlay();
}
function rsvpPlay() {
  clearInterval(_rsvpTimer);
  const ms = 60000 / _rsvpWpm;
  _rsvpTimer = setInterval(() => {
    if (_rsvpIdx >= _rsvpWords.length) { clearInterval(_rsvpTimer); return; }
    const w = _rsvpWords[_rsvpIdx++];
    const mid = Math.floor(w.length / 3);
    document.getElementById("rsvp-word").innerHTML = w.slice(0,mid) + "<span style='color:#4facfe'>" + w[mid] + "</span>" + w.slice(mid+1);
  }, ms);
  document.getElementById("rsvp-btn").textContent = "⏸";
}
function rsvpTogglePause() {
  if (_rsvpTimer) { clearInterval(_rsvpTimer); _rsvpTimer = null; document.getElementById("rsvp-btn").textContent = "▶"; }
  else rsvpPlay();
}
function rsvpSpeed(delta) {
  _rsvpWpm = Math.max(100, _rsvpWpm + delta);
  document.getElementById("rsvp-wpm").textContent = _rsvpWpm;
  if (_rsvpTimer) rsvpPlay();
}


document.addEventListener('click', function(e) {
  const tb = document.querySelector('.reader-toolbar');
  if (tb && !tb.contains(e.target)) { tb.classList.toggle('visible'); }
});
function updateProgressBar(pct) {
  const bar = document.getElementById('progress-bar');
  if (bar) bar.style.width = pct + '%';
}

</script>

<script>
const params = new URLSearchParams(location.search);
const bookId = params.get('id');
let book, rendition, fontSize = 18;
const statusEl = document.getElementById('status');

function log(msg) { statusEl.textContent = msg; console.log('[reader]', msg); }

async function init() {
    if (!bookId) { log('No book ID'); return; }
    log('Loading book data...');

    const data = await BC.get('/books/' + bookId);
    document.getElementById('book-title').textContent = data.title || 'Unknown';
    bookLang = data.language || '';

    const epubFile = (data.files || []).find(f => f.format === 'epub');
    const mobiFile = !epubFile && (data.files || []).find(f => ['mobi','azw3','azw','kfx'].includes(f.format));
    const pdfFile = !epubFile && !mobiFile && (data.files || []).find(f => f.format === 'pdf' && f.file_name === 'ocr_result.pdf')
        || !epubFile && !mobiFile && (data.files || []).find(f => f.format === 'pdf');
    // Set up genre margin strips
    const genre = detectGenre(data.title, data.description, []);
    setupMargins(genre);
    document.getElementById('book-title').title = 'Genre: ' + genre;

    // PDF viewer
    if (pdfFile) {
        return initPdfViewer(bookId, pdfFile);
    }

    if (!epubFile && mobiFile) {
        log('Converting ' + mobiFile.format.toUpperCase() + ' to EPUB...');
        try {
            const convResp = await fetch(API + '/books/' + bookId + '/convert/epub', {method:'POST', credentials:'same-origin'});
            if (convResp.ok) {
                const convData = await convResp.json();
                if (convData.file_id) {
                    log('Conversion done, reloading...');
                    location.reload();
                    return;
                }
            }
        } catch(e) {}
        log('No EPUB available and conversion failed');
        return;
    }
    if (!epubFile) { log('No EPUB file found'); return; }

    // Check for audio version
    if ((data.formats||[]).some(f => ['mp3','m4b','m4a'].includes(f))) {
        document.getElementById('sync-btn').style.display = '';
    }

    log('Downloading EPUB (' + (epubFile.file_size / 1024).toFixed(0) + ' KB)...');

    try {
        const resp = await fetch(API + '/books/' + bookId + '/file/' + epubFile.id, {credentials: 'same-origin'});
        if (!resp.ok) { log('Failed to fetch EPUB: HTTP ' + resp.status); return; }
        const arrayBuffer = await resp.arrayBuffer();
        log('Parsing EPUB...');

        book = ePub(arrayBuffer);
        rendition = book.renderTo('viewer', {
            width: '100%',
            height: '100%',
            spread: 'none',
            flow: 'scrolled-doc',
        });

        // Apply dark theme + image scaling
        rendition.themes.default({
            body: { background: '#1a1a2e !important', color: '#e2e8f0 !important', 'max-width': '800px !important', margin: '0 auto !important', padding: '1rem !important' },
            'p, div, span, h1, h2, h3, h4, h5, h6, li, a': { color: '#e2e8f0 !important' },
            'img': { 'max-width': '100% !important', height: 'auto !important', display: 'block !important', margin: '0 auto !important' },
            'svg': { 'max-width': '100% !important', height: 'auto !important' },
            'image': { 'max-width': '100% !important' },
        });
        rendition.themes.fontSize(fontSize + 'px');

        // Load saved progress
        const progress = await BC.get('/progress/' + bookId);
        if (progress && progress.position) {
            log('Resuming from saved position...');
            await rendition.display(progress.position);
        } else {
            await rendition.display();
        }
        log('');

        // Generate locations for accurate progress tracking (non-blocking)
        let locationsReady = false;
        book.locations.generate(1024).then(() => { locationsReady = true; });

        // Track progress on page turn
        rendition.on('relocated', loc => {
            const pct = locationsReady ? book.locations.percentageFromCfi(loc.start.cfi) * 100 : (loc.start.percentage || 0) * 100;
            document.getElementById('progress-bar').style.width = pct + '%';
            scrollMargins(pct);
            if (loc.start.cfi) {
                BC.put('/progress/' + bookId, { position: loc.start.cfi, percentage: pct });
            }
            statusEl.textContent = Math.round(pct) + '%';
            trackPageTurn();
        });

        // TOC
        const nav = await book.loaded.navigation;
        if (nav && nav.toc) {
            document.getElementById('toc').innerHTML = '<h3>Table of Contents</h3>' +
                nav.toc.map(ch => `<a href="#" onclick="goTo('${ch.href}');return false">${ch.label.trim()}</a>`).join('');
        }

        // Keyboard navigation
        rendition.on('keyup', handleKey);
        document.addEventListener('keyup', handleKey);

        // Click to turn pages
        rendition.on('click', (e) => {
            const w = rendition.manager?.container?.clientWidth || window.innerWidth;
            if (e.clientX < w * 0.3) rendition.prev();
            else if (e.clientX > w * 0.7) rendition.next();
        });

        // Setup dictionary (tap-to-define)
        setupDictionary();

    } catch (e) {
        log('Error: ' + e.message);
        console.error(e);
    }
}

// Genre color coding for margins
const GENRE_COLORS = {
    // Fiction — vertical gradient feel
    fiction:'#2563eb', romance:'#e11d48', thriller:'#0f172a', fantasy:'#7c3aed',
    'sci-fi':'#0891b2', horror:'#450a0a', mystery:'#854d0e', literary:'#065f46',

    // Non-fiction — different pattern
    'non-fiction':'#dc2626', 'self-help':'#f59e0b', business:'#1d4ed8',
    science:'#059669', history:'#92400e', philosophy:'#4338ca',
    psychology:'#0d9488', technology:'#475569', cooking:'#ea580c', health:'#16a34a',
};

function detectGenre(title, desc, tags) {
    const text = (title + ' ' + (desc||'') + ' ' + (tags||[]).join(' ')).toLowerCase();
    const checks = [
        ['erotica', ['erotica','bdsm','femdom','erotic','kink','dominant']],
        ['romance', ['romance','love story','romantic']],
        ['thriller', ['thriller','suspense','crime']],
        ['fantasy', ['fantasy','magic','dragon','wizard']],
        ['sci-fi', ['sci-fi','science fiction','space','robot']],
        ['horror', ['horror','ghost','haunted']],
        ['mystery', ['mystery','murder']],
        ['self-help', ['self-help','self help','how to','guide','workbook']],
        ['business', ['business','entrepreneur','startup','marketing']],
        ['science', ['science','physics','biology','chemistry']],
        ['history', ['history','historical','war','ancient']],
        ['philosophy', ['philosophy','ethics']],
        ['psychology', ['psychology','mental','cognitive','therapy','anxiety']],
        ['technology', ['programming','software','computer','data science']],
        ['health', ['health','fitness','diet','yoga','meditation']],
    ];
    for (const [genre, kws] of checks) {
        if (kws.some(k => text.includes(k))) return genre;
    }
    return text.match(/novel|story|tales|fiction/) ? 'fiction' : 'non-fiction';
}

function setupMargins(genre) {
    const color = GENRE_COLORS[genre] || GENRE_COLORS['fiction'];
    const isNonFiction = ['non-fiction','self-help','business','science','history','philosophy','psychology','technology','cooking','health'].includes(genre);

    // Create gradient: for fiction, vertical flowing stripe; for non-fiction, horizontal dashes
    const leftEl = document.getElementById('margin-left');
    const rightEl = document.getElementById('margin-right');

    if (isNonFiction) {
        // Horizontal dashes pattern
        leftEl.style.background = `repeating-linear-gradient(0deg, ${color} 0px, ${color} 3px, transparent 3px, transparent 18px)`;
        rightEl.style.background = `repeating-linear-gradient(0deg, ${color} 0px, ${color} 3px, transparent 3px, transparent 18px)`;
    } else {
        // Solid color strip with subtle gradient
        leftEl.style.background = `linear-gradient(180deg, ${color}, ${color}dd, ${color}88, ${color}dd, ${color})`;
        rightEl.style.background = `linear-gradient(180deg, ${color}88, ${color}dd, ${color}, ${color}dd, ${color}88)`;
    }
}

function scrollMargins(pct) {

}

function setupDictionary() {
    if (!rendition) return;
    rendition.on('selected', async (cfiRange, contents) => {
        const text = rendition.getRange(cfiRange)?.toString().trim();
        if (!text || text.length < 2) return;
        const popup = document.getElementById('dict-popup');
        const wordEl = document.getElementById('dict-word');
        const defEl = document.getElementById('dict-def');
        popup.style.display = '';
        popup.style.top = '80px'; popup.style.left = '50%'; popup.style.transform = 'translateX(-50%)';

        const wordCount = text.split(/\s+/).length;

        if (wordCount === 1 && text.length <= 30) {
            // ── Single word: dictionary lookup ──
            wordEl.textContent = text;
            defEl.textContent = 'Looking up...';
            // Try book's language first, fall back to English
            const lang = (bookLang || 'en').slice(0, 2);
            let found = false;
            for (const tryLang of [lang, 'en'].filter((v,i,a) => a.indexOf(v)===i)) {
                try {
                    const resp = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/${tryLang}/${encodeURIComponent(text.toLowerCase())}`);
                    if (resp.ok) {
                        const data = await resp.json();
                        const meanings = data[0]?.meanings || [];
                        let html = '';
                        if (data[0]?.phonetic) html += `<div style="color:#64748b;margin-bottom:4px">${data[0].phonetic}</div>`;
                        for (const m of meanings.slice(0, 3)) {
                            html += `<div style="margin-bottom:6px"><em style="color:#94a3b8">${m.partOfSpeech}</em>`;
                            for (const d of m.definitions.slice(0, 2)) {
                                html += `<div style="margin-left:8px">• ${d.definition}</div>`;
                            }
                            html += '</div>';
                        }
                        defEl.innerHTML = html || 'No definition found';
                        found = true; break;
                    }
                } catch(e) {}
            }
            if (!found) defEl.textContent = 'No definition found for "' + text + '"';

        } else {
            // ── Multi-word: clipping + explain ──
            const short = text.length > 80 ? text.slice(0, 80) + '…' : text;
            wordEl.textContent = '📎 "' + short + '"';
            defEl.innerHTML = `
                <div style="margin-bottom:8px;display:flex;gap:6px;flex-wrap:wrap">
                    <button onclick="saveClipping()" style="padding:4px 10px;border-radius:4px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;cursor:pointer;font-size:.8rem">📋 Save clipping</button>
                    <button onclick="explainSelection()" style="padding:4px 10px;border-radius:4px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;cursor:pointer;font-size:.8rem">💡 Explain</button>
                    <button onclick="translateSelection()" style="padding:4px 10px;border-radius:4px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;cursor:pointer;font-size:.8rem">🌐 Translate</button>
                </div>
                <div id="explain-result"></div>`;
            window._selectedText = text;
            window._selectedCfi = cfiRange;
        }
    });
}

    pagesRead++;
    const elapsed = (Date.now() - readingStart) / 60000; // minutes
    if (elapsed > 1 && pagesRead > 2) {
        const ppm = (pagesRead / elapsed).toFixed(1);
        const totalPages = book?.locations?.total || 100;
        const remaining = totalPages - (rendition?.location?.start?.displayed?.page || 0);
        const eta = remaining > 0 ? Math.round(remaining / (pagesRead / elapsed)) : 0;

        document.getElementById('reading-speed').textContent = `${ppm} pg/min · ~${etaStr} left`;

}


// ── Stylus annotation layer ───────────────────────────────────────────────
let penActive = false, penColor = '#000000', penWidth = 2;
let penStrokes = []; // current page strokes
let currentStroke = null;
const penCanvas = document.getElementById('pen-canvas');
const penCtx = penCanvas.getContext('2d');

function resizePenCanvas() {
    const viewer = document.getElementById('viewer');
    penCanvas.width = viewer.scrollWidth || window.innerWidth;
    penCanvas.height = viewer.scrollHeight || (window.innerHeight - 45);
    penCanvas.style.width = penCanvas.width + 'px';
    penCanvas.style.height = penCanvas.height + 'px';
    redrawStrokes();
}
window.addEventListener('resize', resizePenCanvas);
// Re-size when content loads
new MutationObserver(resizePenCanvas).observe(document.getElementById('viewer'), {childList:true, subtree:true});

function togglePen() {
    penActive = !penActive;
    const btn = document.getElementById('pen-btn');
    const colorPicker = document.getElementById('pen-color');
    btn.style.background = penActive ? '#3b82f6' : '#0f172a';
    colorPicker.style.display = penActive ? '' : 'none';
    penCanvas.style.pointerEvents = penActive ? 'auto' : 'none';
}

penCanvas.addEventListener('pointerdown', (e) => {
    // Auto-detect: stylus = draw, finger/mouse = pass through (unless pen mode on)
    if (e.pointerType === 'pen') { if (!penActive) togglePen(); }
    else if (!penActive) return;
    const isPen = e.pointerType === 'pen';
    const pressure = isPen ? e.pressure : 0.5;
    const vr = document.getElementById('viewer').getBoundingClientRect();
    currentStroke = {
        points: [[e.clientX - vr.left + document.getElementById('viewer').scrollLeft, e.clientY - vr.top + document.getElementById('viewer').scrollTop, pressure]],
        color: penColor,
        width: penColor === '#ffeb3b' ? 16 : penWidth, // highlighter = wide
        opacity: penColor === '#ffeb3b' ? 0.3 : 1,
    };
    penCanvas.setPointerCapture(e.pointerId);
});

penCanvas.addEventListener('pointermove', (e) => {
    if (!currentStroke) return;
    const pressure = e.pointerType === 'pen' ? e.pressure : 0.5;
    const vr2 = document.getElementById('viewer').getBoundingClientRect();
    currentStroke.points.push([e.clientX - vr2.left + document.getElementById('viewer').scrollLeft, e.clientY - vr2.top + document.getElementById('viewer').scrollTop, pressure]);
    // Draw incrementally
    const pts = currentStroke.points;
    if (pts.length < 2) return;
    const p1 = pts[pts.length - 2], p2 = pts[pts.length - 1];
    penCtx.beginPath();
    penCtx.moveTo(p1[0], p1[1]);
    penCtx.lineTo(p2[0], p2[1]);
    penCtx.strokeStyle = currentStroke.color;
    penCtx.lineWidth = currentStroke.width * (p2[2] + 0.5);
    penCtx.globalAlpha = currentStroke.opacity;
    penCtx.lineCap = 'round';
    penCtx.lineJoin = 'round';
    penCtx.stroke();
    penCtx.globalAlpha = 1;
});

penCanvas.addEventListener('pointerup', async () => {
    if (!currentStroke || currentStroke.points.length < 2) { currentStroke = null; return; }
    penStrokes.push(currentStroke);
    currentStroke = null;
    // Anchor to nearest word at stroke center
    const bbox = currentStroke ? null : penStrokes[penStrokes.length-1]?.points;
    const pts = penStrokes[penStrokes.length-1]?.points || [];
    let anchorWord = '';
    if (pts.length > 0) {
        const cx = pts.reduce((s,p)=>s+p[0],0)/pts.length;
        const cy = pts.reduce((s,p)=>s+p[1],0)/pts.length;
        const vr3 = document.getElementById('viewer').getBoundingClientRect();
        const el = document.elementFromPoint(cx + vr3.left, cy + vr3.top - document.getElementById('viewer').scrollTop);
        if (el) anchorWord = (el.textContent || '').trim().slice(0, 30);
    }
    // Save to server
    const cfi = rendition?.location?.start?.cfi || '';
    const pct = rendition?.location?.start?.percentage || 0;
    try {
        await BC.post('/books/' + bookId + '/pen-annotations', {
            cfi, page_pct: pct,
            strokes: penStrokes.map(s => ({
                points: s.points, color: s.color, width: s.width, opacity: s.opacity
            }))
        });
    } catch(e) {}
});

function redrawStrokes() {
    penCtx.clearRect(0, 0, penCanvas.width, penCanvas.height);
    for (const s of penStrokes) {
        if (s.points.length < 2) continue;
        penCtx.strokeStyle = s.color;
        penCtx.lineWidth = s.width;
        penCtx.globalAlpha = s.opacity;
        penCtx.lineCap = 'round';
        penCtx.lineJoin = 'round';
        penCtx.beginPath();
        penCtx.moveTo(s.points[0][0], s.points[0][1]);
        for (let i = 1; i < s.points.length; i++) {
            const p = s.points[i];
            penCtx.lineWidth = s.width * (p[2] + 0.5);
            penCtx.lineTo(p[0], p[1]);
        }
        penCtx.stroke();
    }
    penCtx.globalAlpha = 1;
}

        label.textContent = pdf.file_name === 'ocr_result.pdf' ? '🔍 OCR (hybrid)' : '📄 Original';
        label.textContent += ` (${(pdf.file_size/1048576).toFixed(1)}MB)`;

        keepBtn.onclick = async () => {

            setTimeout(() => location.reload(), 1000);
        };
        label.appendChild(keepBtn);
        col.appendChild(label);

        const resp = await fetch(API + '/books/' + bookId + '/file/' + pdf.id, {credentials: 'same-origin'});
        const buf = await resp.arrayBuffer();
        const pdfDoc = await pdfjsLib.getDocument({data: buf}).promise;
        const scale = window.devicePixelRatio * 1.2;

        for (let i = 1; i <= Math.min(pdfDoc.numPages, 20); i++) {
            const page = await pdfDoc.getPage(i);
            const vp = page.getViewport({scale});
            const canvas = document.createElement('canvas');
            canvas.width = vp.width; canvas.height = vp.height;
            canvas.style.cssText = 'width:100%;height:auto;display:block;margin:0 0 2px';
            col.appendChild(canvas);
            page.render({canvasContext: canvas.getContext('2d'), viewport: vp});
        }
        viewer.appendChild(col);
    }
    // Sync scroll
    const cols = viewer.children;
    if (cols.length === 2) {
        cols[0].addEventListener('scroll', () => { cols[1].scrollTop = cols[0].scrollTop; });
        cols[1].addEventListener('scroll', () => { cols[0].scrollTop = cols[1].scrollTop; });
    }
}

                    const matches = [];
                    let idx = text.toLowerCase().indexOf(q.toLowerCase());
                    while (idx !== -1 && matches.length < 5) {
                        const excerpt = text.slice(Math.max(0, idx - 40), idx + q.length + 40);
                        matches.push({excerpt, cfi: item.cfiFromElement(doc.body)});
                        idx = text.toLowerCase().indexOf(q.toLowerCase(), idx + 1);
                    }
                    item.unload();
                    return matches;
                }).catch(() => [])
            )
        );

        const flat = results.flat();
        if (flat.length === 0) {
            el.innerHTML = '<div style="color:#94a3b8">No results</div>';
            return;
        }
        el.innerHTML = flat.map((r, i) => {
            const hl = r.excerpt.replace(new RegExp(q, 'gi'), m => `<mark style="background:#f59e0b;color:#000">${m}</mark>`);
            return `<div style="padding:.4rem 0;border-bottom:1px solid #334155;cursor:pointer" onclick="goToSearchResult(${i})">${hl}</div>`;
        }).join('');
        window._searchResults = flat;
    } catch(e) {
        el.innerHTML = '<div style="color:#ef4444">Search error</div>';
    }
}

function goToSearchResult(i) {
    const r = window._searchResults?.[i];
    if (r && rendition) rendition.display(r.cfi);
}


// Pinch-to-zoom → font size (tablet support)
let pinchStartDist = 0;
let pinchStartSize = fontSize;
document.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
        pinchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        pinchStartSize = fontSize;
    }
}, {passive: true});
document.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        const scale = dist / pinchStartDist;
        const newSize = Math.max(12, Math.min(32, Math.round(pinchStartSize * scale)));
        if (newSize !== fontSize) {
            fontSize = newSize;
            if (rendition) rendition.themes.fontSize(fontSize + 'px');
        }
    }
}, {passive: true});

// ── PDF Viewer ───────────────────────────────────────────────────────────
async function initPdfViewer(bookId, pdfFile) {
    log('Loading PDF...');
    const viewer = document.getElementById('viewer');
    viewer.style.overflow = 'auto';
    viewer.style.textAlign = 'center';
    viewer.style.padding = '0';

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const resp = await fetch(API + '/books/' + bookId + '/file/' + pdfFile.id, {credentials: 'same-origin'});
    const arrayBuffer = await resp.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
    const totalPages = pdf.numPages;
    log(`PDF: ${totalPages} pages`);

    // Load saved position
    let currentPage = 1;
    try {
        const progress = await BC.get('/progress/' + bookId);
        if (progress && progress.position) currentPage = parseInt(progress.position) || 1;
    } catch(e) {}

    // Render pages into canvases
    const container = document.createElement('div');
    container.id = 'pdf-pages';
    container.style.cssText = 'max-width:900px;margin:0 auto;';
    viewer.appendChild(container);

    const canvases = [];
    const scale = window.devicePixelRatio * 1.5;

    for (let i = 1; i <= totalPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({scale});
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        canvas.style.cssText = 'width:100%;height:auto;display:block;margin:0 auto 2px;';
        canvas.dataset.page = i;
        container.appendChild(canvas);
        canvases.push({canvas, page, viewport, rendered: false});
    }

    // Lazy render visible pages
    function renderVisible() {
        const viewTop = viewer.scrollTop - 500;
        const viewBot = viewer.scrollTop + viewer.clientHeight + 500;
        for (const c of canvases) {
            if (c.rendered) continue;
            const top = c.canvas.offsetTop;
            const bot = top + c.canvas.offsetHeight;
            if (bot > viewTop && top < viewBot) {
                c.rendered = true;
                c.page.render({canvasContext: c.canvas.getContext('2d'), viewport: c.viewport});
            }
        }
    }

    // Track scroll position for progress
    let saveTimer = null;
    viewer.addEventListener('scroll', () => {
        renderVisible();
        // Find current page
        const scrollMid = viewer.scrollTop + viewer.clientHeight / 2;
        for (const c of canvases) {
            if (c.canvas.offsetTop + c.canvas.offsetHeight > scrollMid) {
                const pg = parseInt(c.canvas.dataset.page);
                const pct = (pg / totalPages) * 100;
                document.getElementById('progress-bar').style.width = pct + '%';
                statusEl.textContent = `Page ${pg}/${totalPages} (${Math.round(pct)}%)`;
                scrollMargins(pct);
                clearTimeout(saveTimer);
                saveTimer = setTimeout(() => {
                    BC.put('/progress/' + bookId, {position: String(pg), percentage: pct});
                }, 1000);
                break;
            }
        }
    });

    // Scroll to saved page
    if (currentPage > 1 && canvases[currentPage - 1]) {
        // Render first few pages + target page area
        renderVisible();
        setTimeout(() => {
            canvases[currentPage - 1].canvas.scrollIntoView();
            renderVisible();
        }, 100);
    } else {
        renderVisible();
    }

    // Keyboard nav
    document.addEventListener('keyup', e => {
        if (e.key === 'ArrowRight') viewer.scrollBy(0, viewer.clientHeight * 0.9);
        else if (e.key === 'ArrowLeft') viewer.scrollBy(0, -viewer.clientHeight * 0.9);
    });

    // Show compare button if multiple PDFs
    const allPdfs = (data.files || []).filter(f => f.format === 'pdf');
    if (allPdfs.length > 1) {
        const cmpBtn = document.createElement('button');
        cmpBtn.textContent = '⚖️ Compare versions';
        cmpBtn.title = 'Side-by-side comparison of original vs OCR';
        cmpBtn.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:60;padding:8px 16px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;cursor:pointer;font-size:.85rem';
        cmpBtn.onclick = () => toggleCompare(allPdfs);
        document.body.appendChild(cmpBtn);
    }

    // Resize pen canvas to cover all PDF pages
    setTimeout(resizePenCanvas, 500);

    // Load pen annotations for current page on scroll
    let penSaveTimer = null;
    viewer.addEventListener('scroll', () => {
        clearTimeout(penSaveTimer);
        penSaveTimer = setTimeout(() => {
            const scrollMid = viewer.scrollTop + viewer.clientHeight / 2;
            for (const cv of canvases) {
                if (cv.canvas.offsetTop + cv.canvas.offsetHeight > scrollMid) {
                    loadPenAnnotations('pdf-page-' + cv.canvas.dataset.page);
                    break;
                }
            }
        }, 500);
    });

    log('');
}


function toggleBionic() {
  document.body.classList.toggle('bionic');
  const frames = document.querySelectorAll('iframe');
  frames.forEach(f => {
    try {
      const doc = f.contentDocument;
      if (doc) {
        let style = doc.getElementById('bionic-style');
        if (style) { style.remove(); return; }
        style = doc.createElement('style');
        style.id = 'bionic-style';
        style.textContent = '.bionic-word b { font-weight: 700; }';
        doc.head.appendChild(style);
        doc.querySelectorAll('p, li, td, span, div').forEach(el => {
          if (el.children.length === 0 && el.textContent.trim()) {
            el.innerHTML = el.textContent.replace(/\b(\w)(\w+)/g, '<b class="bionic-word">$1</b>$2');
          }
        });
      }
    } catch(e) {}
  });
}


function toggleRSVP() {
  let overlay = document.getElementById("rsvp-overlay");
  if (overlay) { overlay.remove(); return; }
  overlay = document.createElement("div");
  overlay.id = "rsvp-overlay";
  overlay.style.cssText = "position:fixed;inset:0;z-index:9999;background:var(--bg,#0f1115);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text,#e2e8f0)";
  overlay.innerHTML = `<div id="rsvp-word" style="font-size:3rem;font-weight:700;min-height:4rem;display:flex;align-items:center"></div>
    <div style="margin-top:2rem;display:flex;gap:1rem;align-items:center">
      <button onclick="rsvpSpeed(-50)">−</button>
      <span id="rsvp-wpm">300</span> WPM
      <button onclick="rsvpSpeed(50)">+</button>
      <button onclick="rsvpTogglePause()" id="rsvp-btn">⏸</button>
      <button onclick="document.getElementById('rsvp-overlay').remove()">✕</button>
    </div>`;
  document.body.appendChild(overlay);
  startRSVP();
}
let _rsvpWords=[], _rsvpIdx=0, _rsvpWpm=300, _rsvpTimer=null;
function startRSVP() {
  // Get text from current EPUB/PDF view
  const frames = document.querySelectorAll("iframe");
  let text = "";
  frames.forEach(f => { try { text += f.contentDocument.body.innerText + " "; } catch(e){} });
  if (!text) text = document.querySelector(".reader-content")?.innerText || "No text available";
  _rsvpWords = text.split(/\s+/).filter(w => w.length > 0);
  _rsvpIdx = 0;
  _rsvpWpm = 300;
  rsvpPlay();
}
function rsvpPlay() {
  clearInterval(_rsvpTimer);
  const ms = 60000 / _rsvpWpm;
  _rsvpTimer = setInterval(() => {
    if (_rsvpIdx >= _rsvpWords.length) { clearInterval(_rsvpTimer); return; }
    const w = _rsvpWords[_rsvpIdx++];
    const mid = Math.floor(w.length / 3);
    document.getElementById("rsvp-word").innerHTML = w.slice(0,mid) + "<span style='color:#4facfe'>" + w[mid] + "</span>" + w.slice(mid+1);
  }, ms);
  document.getElementById("rsvp-btn").textContent = "⏸";
}
function rsvpTogglePause() {
  if (_rsvpTimer) { clearInterval(_rsvpTimer); _rsvpTimer = null; document.getElementById("rsvp-btn").textContent = "▶"; }
  else rsvpPlay();
}
function rsvpSpeed(delta) {
  _rsvpWpm = Math.max(100, _rsvpWpm + delta);
  document.getElementById("rsvp-wpm").textContent = _rsvpWpm;
  if (_rsvpTimer) rsvpPlay();
}


document.addEventListener('click', function(e) {
  const tb = document.querySelector('.reader-toolbar');
  if (tb && !tb.contains(e.target)) { tb.classList.toggle('visible'); }
});
function updateProgressBar(pct) {
  const bar = document.getElementById('progress-bar');
  if (bar) bar.style.width = pct + '%';
}
