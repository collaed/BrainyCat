<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BrainyCat — Intelligence Dashboard</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--success:#22c55e;--warn:#f59e0b;--danger:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--bg);color:var(--text)}
header{background:var(--surface);padding:.8rem 1.5rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border)}
header a{color:var(--muted);text-decoration:none}header h2{flex:1}
.container{max-width:1000px;margin:0 auto;padding:1.5rem}
h3{margin:1.5rem 0 .8rem;color:var(--muted);font-size:.9rem;text-transform:uppercase;letter-spacing:.05em}
table{width:100%;border-collapse:collapse;margin-bottom:1.5rem}
th{text-align:left;padding:.5rem .8rem;font-size:.75rem;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase}
td{padding:.5rem .8rem;font-size:.85rem;border-bottom:1px solid var(--border)}
tr:hover{background:rgba(59,130,246,0.05)}
.bar{height:6px;border-radius:3px;background:var(--border);position:relative;min-width:60px}
.bar-fill{height:100%;border-radius:3px;position:absolute;left:0;top:0}
.trust-high{color:var(--success)}.trust-med{color:var(--warn)}.trust-low{color:var(--danger)}
.stat{background:var(--surface);border-radius:10px;padding:1rem;border:1px solid var(--border);text-align:center}
.stat .num{font-size:1.8rem;font-weight:700;color:var(--accent)}.stat .label{font-size:.75rem;color:var(--muted)}
.grid4{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem}
.badge{display:inline-block;padding:.1rem .4rem;border-radius:4px;font-size:.7rem;font-weight:600}
.badge-auth{background:#14532d;color:#86efac}.badge-comm{background:#1e3a5f;color:#93c5fd}.badge-cover{background:#4a1d6a;color:#d8b4fe}
#loading{text-align:center;padding:3rem;color:var(--muted)}
</style></head><body>
<header>
<a href="index.html">← Library</a>
<h2>🧠 Intelligence Dashboard</h2>
</header>
<div class="container">
<div id="loading">Loading intelligence data...</div>
<div id="content" style="display:none">

<div class="grid4" id="summary-cards"></div>

<h3>📡 Enrichment Sources — Reliability & Trust</h3>
<table id="sources-table">
<thead><tr><th>Source</th><th>Type</th><th>Hits</th><th>Total</th><th>Hit Rate</th><th>Trust</th><th>Notes</th></tr></thead>
<tbody></tbody>
</table>

<h3>🔄 Over-Tried Books (need deep enrichment)</h3>
<table id="overtried-table">
<thead><tr><th>Title</th><th>Attempts</th><th>Quality</th><th>Action</th></tr></thead>
<tbody></tbody>
</table>

<h3>🎯 Contribution Opportunities (we know more than Open Library)</h3>
<div id="contribute-info"></div>

</div>
</div>
<script src="api.js?v=3"></script>
<script>
const SOURCE_META = {
    google_books: {type:'Global API', trust:'high', notes:'Best fuzzy search. Rate-limited at ~100/min. Returns ISBN, description, categories, cover.'},
    open_library: {type:'Open Data', trust:'high', notes:'Community-maintained. Works API for editions. Free, lenient rate limits. We contribute back.'},
    gutendex: {type:'Public Domain', trust:'high', notes:'Gutenberg catalog API. Only matches public domain books.'},
    loc: {type:'Authority', trust:'very high', notes:'Library of Congress. Authoritative MARC records. Currently 0% — may need different search strategy.'},
    amazon: {type:'Commercial', trust:'medium', notes:'12 country variants. Aggressive anti-scraping. Currently blocked (0%).'},
    hardcover: {type:'Social', trust:'medium', notes:'Community ratings and reviews. New service, growing catalog.'},
    oclc: {type:'Authority', trust:'very high', notes:'WorldCat — largest library catalog. Needs API key for full access.'},
    writeback: {type:'Internal', trust:'n/a', notes:'Metadata written back into EPUB files. 100% success when triggered.'},
    bnf: {type:'National (🇫🇷)', trust:'very high', notes:'Bibliothèque nationale de France. Authoritative for French books.'},
    dnb: {type:'National (🇩🇪)', trust:'very high', notes:'Deutsche Nationalbibliothek. Authoritative for German books.'},
    bne: {type:'National (🇪🇸)', trust:'very high', notes:'Biblioteca Nacional de España.'},
    viaf: {type:'Authority', trust:'very high', notes:'Virtual International Authority File. Author disambiguation.'},
    isni: {type:'Authority', trust:'very high', notes:'International Standard Name Identifier.'},
    storygraph: {type:'Social', trust:'medium', notes:'Community reviews, mood tags, pacing info.'},
    babelio: {type:'Social (🇫🇷)', trust:'medium', notes:'French book community. Good for French-language metadata.'},
    inventaire: {type:'Open Data', trust:'high', notes:'Wikidata-based book database. Linked open data.'},
    bookbrainz: {type:'Open Data', trust:'high', notes:'MusicBrainz for books. Community-curated.'},
};

const TRUST_COLORS = {
    'very high': 'trust-high', 'high': 'trust-high',
    'medium': 'trust-med', 'low': 'trust-low', 'n/a': 'trust-med'
};

async function load() {
    try {
        const [stats, dashboard] = await Promise.all([
            BC.get('/enrichment/source-stats').catch(()=>({})),
            BC.get('/stats/dashboard').catch(()=>({})),
        ]);

        const lib = dashboard.library || {};
        document.getElementById('summary-cards').innerHTML = `
            <div class="stat"><div class="num">${lib.total_books||0}</div><div class="label">Books</div></div>
            <div class="stat"><div class="num">${lib.has_isbn?.pct||0}%</div><div class="label">ISBN Coverage</div></div>
            <div class="stat"><div class="num">${lib.has_description?.pct||0}%</div><div class="label">Descriptions</div></div>
            <div class="stat"><div class="num">${lib.avg_quality||0}</div><div class="label">Avg Quality</div></div>
        `;

        // Sources table
        const tbody = document.querySelector('#sources-table tbody');
        const sources = stats.sources || [];
        // Add known sources that haven't been tried yet
        const tried = new Set(sources.map(s=>s.method));
        for (const [key, meta] of Object.entries(SOURCE_META)) {
            if (!tried.has(key)) sources.push({method:key, hits:0, total:0, hit_pct:0});
        }
        sources.sort((a,b) => (b.total||0) - (a.total||0));

        for (const s of sources) {
            const meta = SOURCE_META[s.method] || {type:'Unknown', trust:'medium', notes:''};
            const pct = s.hit_pct || 0;
            const trustClass = TRUST_COLORS[meta.trust] || 'trust-med';
            const barColor = pct > 10 ? 'var(--success)' : pct > 2 ? 'var(--warn)' : 'var(--danger)';
            tbody.innerHTML += `<tr>
                <td><strong>${s.method}</strong></td>
                <td><span class="badge ${meta.type.includes('Authority')?'badge-auth':meta.type.includes('Social')?'badge-comm':'badge-cover'}">${meta.type}</span></td>
                <td>${s.hits||0}</td>
                <td>${s.total||0}</td>
                <td><div class="bar"><div class="bar-fill" style="width:${Math.min(pct,100)}%;background:${barColor}"></div></div> ${pct}%</td>
                <td class="${trustClass}">${meta.trust}</td>
                <td style="font-size:.75rem;color:var(--muted)">${meta.notes}</td>
            </tr>`;
        }

        // Over-tried books
        const otbody = document.querySelector('#overtried-table tbody');
        for (const b of (stats.over_tried || [])) {
            otbody.innerHTML += `<tr>
                <td>${b.title?.slice(0,50)}</td>
                <td>${b.attempts}</td>
                <td>${b.quality_score}/100</td>
                <td><button onclick="deepEnrich('${b.title}')" style="padding:.2rem .5rem;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--accent);cursor:pointer;font-size:.75rem">🔍 Deep Enrich</button></td>
            </tr>`;
        }

        // Contribution opportunities
        const contribs = await BC.get('/books?limit=100&q=can_contribute').catch(()=>({books:[]}));
        document.getElementById('contribute-info').innerHTML = `
            <p style="color:var(--muted);font-size:.85rem">Books where we have data that Open Library is missing are flagged automatically during enrichment. Register an <a href="https://openlibrary.org/account/create" target="_blank" style="color:var(--accent)">Open Library API key</a> to enable automatic contribution.</p>
        `;

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = '';
    } catch(e) {
        document.getElementById('loading').textContent = 'Error: ' + e.message;
    }
}

async function deepEnrich(title) {
    alert('Deep enrichment triggered for: ' + title);
}

load();
</script></body></html>
