<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BrainyCat — Intelligence</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--success:#22c55e;--warn:#f59e0b;--danger:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--bg);color:var(--text)}
header{background:var(--surface);padding:.8rem 1.5rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
header a{color:var(--muted);text-decoration:none}header h2{flex:1}
nav{display:flex;gap:.5rem}nav a{padding:.3rem .6rem;font-size:.8rem;color:var(--muted);text-decoration:none}
.container{max-width:900px;margin:0 auto;padding:1.5rem}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.icard{background:var(--surface);border-radius:10px;padding:1.2rem;cursor:pointer;transition:transform .1s;border:1px solid var(--border)}
.icard:hover{transform:translateY(-2px);border-color:var(--accent)}
.icard h3{font-size:1rem;margin-bottom:.4rem;display:flex;align-items:center;gap:.5rem}
.icard .count{background:var(--accent);color:#fff;font-size:.7rem;padding:.1rem .5rem;border-radius:10px}
.icard .count.warn{background:var(--warn)}.icard .count.danger{background:var(--danger)}
.icard p{font-size:.82rem;color:var(--muted);line-height:1.5}
.icard .meta{font-size:.72rem;color:var(--border);margin-top:.5rem}
.actions{margin-top:1.5rem;display:flex;gap:.5rem;flex-wrap:wrap}
.actions button{padding:.5rem 1rem;border-radius:6px;border:none;cursor:pointer;font-size:.85rem;color:#fff}
</style></head><body>
<header><a href="index.html">← Library</a><h2>🧠 Library Intelligence</h2>
<nav><a href="catalog.html">📖 Catalog</a><a href="incoming.html">📥 Incoming</a><a href="intelligence.html">🧠 Intel</a><a href="stats.html">📊 Stats</a><a href="recommendations.html">💡 For You</a></nav>
</header>
<div class="container">
<div class="cards" id="cards">Loading...</div>
<div class="actions">
<button style="background:var(--accent)" onclick="runAction('/covers/optimize',this)">📐 Optimize Covers</button>
<button style="background:var(--success)" onclick="runAction('/covers/generate-missing',this)">🎨 Generate Covers</button>
<button style="background:var(--accent)" onclick="runAction('/covers/extract-pdf',this)">📄 PDF Covers</button>
<button style="background:var(--warn)" onclick="runAction('/fingerprints/compute',this)">🔍 Compute Fingerprints</button>
<button style="background:var(--warn)" onclick="runAction('/fingerprints/find-duplicates',this)">🔎 Find Content Dupes</button>
</div>
</div>
<script src="api.js"></script>
<script>
async function load(){
    const [authors, series, quality, dupes, fpStatus] = await Promise.all([
        BC.get('/intelligence/author-suggestions'),
        BC.get('/intelligence/series-gaps'),
        BC.get('/intelligence/quality'),
        BC.get('/intelligence/duplicates'),
        BC.get('/fingerprints/status'),
    ]);
    document.getElementById('cards').innerHTML = `
        <div class="icard" onclick="location='intel-authors.html'">
            <h3>👤 Author Cleanup ${authors.length?`<span class="count warn">${authors.length}</span>`:''}</h3>
            <p>Merge duplicate authors: "First Last" ↔ "Last, First", abbreviations, typos</p>
            <div class="meta">${authors.length} suggestions pending</div>
        </div>
        <div class="icard" onclick="location='intel-series.html'">
            <h3>📚 Series Detection ${series.length?`<span class="count">${series.length}</span>`:''}</h3>
            <p>Auto-detect book series by shared author and title patterns</p>
            <div class="meta">${series.length} suggestions pending</div>
        </div>
        <div class="icard" onclick="location='intel-dupes.html'">
            <h3>🔄 Title Duplicates ${dupes.length?`<span class="count warn">${dupes.length}</span>`:''}</h3>
            <p>Books with similar titles, same author, similar file size</p>
            <div class="meta">${dupes.length} pairs detected</div>
        </div>
        <div class="icard" onclick="location='intel-content-dupes.html'">
            <h3>📝 Content Duplicates ${fpStatus.pending_matches?`<span class="count danger">${fpStatus.pending_matches}</span>`:''}</h3>
            <p>Deep comparison: 16×2KB text samples from book midpoints, 2% tolerance</p>
            <div class="meta">${fpStatus.fingerprinted} fingerprinted · ${fpStatus.pending_fingerprint} pending · ${fpStatus.pending_matches} matches</div>
        </div>
        <div class="icard" onclick="location='intel-quality.html'">
            <h3>🔍 Quality Issues ${quality.length?`<span class="count">${quality.length}</span>`:''}</h3>
            <p>Low bitrate audio, missing chapters, tiny files</p>
            <div class="meta">${quality.length} issues</div>
        </div>
    `;
}
async function runAction(path,btn){btn.disabled=true;const t=btn.textContent;btn.textContent='⏳...';const r=await BC.post(path);btn.textContent='✅ '+JSON.stringify(r).slice(0,40);setTimeout(()=>{btn.textContent=t;btn.disabled=false;load();},3000);}
load();
</script></body></html>
