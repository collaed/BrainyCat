<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BrainyCat — Recommendations</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--bg);color:var(--text)}
header{background:var(--surface);padding:.8rem 1.5rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border)}
header a{color:var(--muted);text-decoration:none}header h2{flex:1}
.container{max-width:1000px;margin:0 auto;padding:1.5rem}
.section{margin-bottom:2rem}.section h3{margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
.section h3 span{font-size:1.2rem}
.books{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.8rem}
.book{background:var(--surface);border-radius:8px;padding:.8rem;cursor:pointer}
.book:hover{outline:1px solid var(--accent)}
.book .title{font-weight:600;font-size:.9rem}.book .meta{font-size:.8rem;color:var(--muted)}
.empty{color:var(--muted);font-style:italic}
</style></head><body>
<header><a href="index.html">← Library</a><h2>💡 Recommendations</h2>
<button onclick="rebuild()" style="padding:.4rem .8rem;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer">🔄 Rebuild Profile</button>
<nav style="display:flex;gap:.5rem"><a href="catalog.html" style="color:var(--muted);text-decoration:none;padding:.3rem .6rem;font-size:.8rem">📖 Catalog</a><a href="incoming.html" style="color:var(--muted);text-decoration:none;padding:.3rem .6rem;font-size:.8rem">📥 Incoming</a><a href="intelligence.html" style="color:var(--muted);text-decoration:none;padding:.3rem .6rem;font-size:.8rem">🧠 Intel</a><a href="stats.html" style="color:var(--muted);text-decoration:none;padding:.3rem .6rem;font-size:.8rem">📊 Stats</a><a href="recommendations.html" style="color:var(--muted);text-decoration:none;padding:.3rem .6rem;font-size:.8rem">💡 For You</a></nav></header>
<div class="container">
<div class="section"><h3><span>🧬</span> DNA Match</h3><div class="books" id="dna"></div></div>
<div class="section"><h3><span>✍️</span> Authors You Love</h3><div class="books" id="authors"></div></div>
<div class="section"><h3><span>📚</span> Complete Series</h3><div class="books" id="series"></div></div>
</div>
<script src="api.js"></script>
<script>
async function load() {
    const [dna, authors, series] = await Promise.all([BC.get('/recommendations/all'), BC.get('/recommendations/authors_you_love'), BC.get('/recommendations/complete_series')]);
    render('dna', dna);
    render('authors', authors);
    document.getElementById('series').innerHTML = (series||[]).map(s => `<div class="book"><div class="title">${s.series}</div><div class="meta">Next: Book #${s.next}</div></div>`).join('') || '<div class="empty">No series to complete</div>';
}
function render(id, items) {
    document.getElementById(id).innerHTML = (items||[]).map(b => `<div class="book" onclick="location='reader.html?id=${b.id}'"><div class="title">${b.title}</div><div class="meta">${b.author||b.reason||''}</div></div>`).join('') || '<div class="empty">Read more books to get recommendations!</div>';
}
async function rebuild() { await BC.get('/recommendations/profile'); load(); }
load();
</script></body></html>
