<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BrainyCat — Bilingual Reader</title>
<link rel="stylesheet" href="style.css">
<style>
.columns{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 42px)}
.col{overflow-y:auto;padding:1.2rem 1.5rem;line-height:1.8;font-size:.95rem}
.col-left{border-right:1px solid var(--border)}
.col h3{font-size:.8rem;color:var(--accent);margin-bottom:.8rem;position:sticky;top:0;background:var(--bg);padding:.3rem 0;z-index:1}
.para{margin-bottom:.8rem;padding:.4rem .6rem;border-radius:4px;cursor:pointer;transition:background .15s}
.para:hover{background:rgba(59,130,246,.08)}
.para.highlight{background:rgba(59,130,246,.15)}
.para.missing{color:var(--muted);font-style:italic;font-size:.85rem}
.word-popup{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.6rem .8rem;font-size:.85rem;z-index:50;display:none;max-width:300px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.no-trans{display:flex;align-items:center;justify-content:center;height:calc(100vh - 42px);text-align:center;color:var(--muted);padding:2rem}
.no-trans .inner{max-width:400px}
.no-trans h3{margin-bottom:.8rem;font-size:1.1rem;color:var(--text)}
.no-trans p{margin-bottom:1rem;font-size:.9rem}
</style></head><body>
<header>
<a href="index.html">← Library</a>
<h2 id="title">Bilingual Reader</h2>
<span id="info" style="color:var(--muted);font-size:.8rem"></span>
<button class="btn sm" id="sync-btn" onclick="toggleSync()">🔗 Sync scroll</button>
</header>
<div id="content"></div>
<div class="word-popup" id="popup"></div>
<script src="api.js"></script>
<script>
const bookId = new URLSearchParams(location.search).get('id');
let syncScroll = true, paragraphs = [];

async function init() {
    if (!bookId) return;
    const data = await BC.get('/books/' + bookId + '/bilingual');

    if (data.error || !data.paragraphs?.length) {
        document.getElementById('content').innerHTML = `
            <div class="no-trans"><div class="inner">
                <h3>No translation available</h3>
                <p>${data.error || 'This book has not been translated yet.'}</p>
                <button class="btn primary" onclick="location='index.html'">← Back to Library</button>
                <p style="margin-top:1rem;font-size:.8rem;color:var(--muted)">To create a translation: open the book → click 🌐 Translate → select target language</p>
            </div></div>`;
        return;
    }

    paragraphs = data.paragraphs;
    document.getElementById('title').textContent = 'Bilingual Reader';
    document.getElementById('info').textContent = `${data.source_language} → ${data.target_language} · ${data.total_paragraphs} paragraphs · via ${data.backend}`;

    const leftHtml = paragraphs.map((p, i) =>
        `<div class="para${p.original ? '' : ' missing'}" data-idx="${i}" onclick="highlight(${i})">${p.original || '—'}</div>`
    ).join('');
    const rightHtml = paragraphs.map((p, i) =>
        `<div class="para${p.translated ? '' : ' missing'}" data-idx="${i}" onclick="highlight(${i})">${p.translated || '—'}</div>`
    ).join('');

    document.getElementById('content').innerHTML = `
        <div class="columns">
            <div class="col col-left" id="col-left">
                <h3>Original (${data.source_language})</h3>
                ${leftHtml}
            </div>
            <div class="col col-right" id="col-right">
                <h3>Translation (${data.target_language})</h3>
                ${rightHtml}
            </div>
        </div>`;

    // Sync scrolling
    const left = document.getElementById('col-left');
    const right = document.getElementById('col-right');
    left.addEventListener('scroll', () => { if (syncScroll) right.scrollTop = left.scrollTop; });
    right.addEventListener('scroll', () => { if (syncScroll) left.scrollTop = right.scrollTop; });
}

function highlight(idx) {
    document.querySelectorAll('.para').forEach(el => el.classList.remove('highlight'));
    document.querySelectorAll(`[data-idx="${idx}"]`).forEach(el => {
        el.classList.add('highlight');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
}

function toggleSync() {
    syncScroll = !syncScroll;
    document.getElementById('sync-btn').textContent = syncScroll ? '🔗 Sync scroll' : '🔓 Free scroll';
}

// Word click → translation popup
document.addEventListener('click', async e => {
    const popup = document.getElementById('popup');
    popup.style.display = 'none';
    if (e.target.classList.contains('para') && e.target.closest('.col-left')) {
        const sel = window.getSelection();
        const word = sel?.toString().trim();
        if (word && word.length > 1 && word.length < 50) {
            popup.textContent = 'Translating...';
            popup.style.display = 'block';
            popup.style.left = e.clientX + 'px';
            popup.style.top = (e.clientY + 20) + 'px';
            try {
                const r = await BC.post('/ai/ask/' + bookId + '?question=' + encodeURIComponent('Translate this word/phrase to English: ' + word));
                popup.textContent = r.answer || word;
            } catch { popup.textContent = word; }
        }
    }
});

init();
</script></body></html>
