<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BrainyCat — Incoming</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--success:#22c55e;--danger:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--bg);color:var(--text)}
header{background:var(--surface);padding:.8rem 1.5rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border)}
header a{color:var(--muted);text-decoration:none}header h2{flex:1}
header button{padding:.4rem .8rem;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer}
.container{max-width:900px;margin:0 auto;padding:1.5rem}
.item{background:var(--surface);border-radius:8px;padding:1rem;margin-bottom:.8rem;display:flex;align-items:center;gap:1rem}
.item .info{flex:1}.item .name{font-weight:600}.item .parsed{font-size:.85rem;color:var(--muted)}
.item .status{font-size:.75rem;padding:.2rem .5rem;border-radius:4px;text-transform:uppercase}
.status.pending{background:#854d0e;color:#fbbf24}.status.confirmed{background:#166534;color:#86efac}.status.rejected{background:#991b1b;color:#fca5a5}
.item button{padding:.4rem .8rem;border-radius:6px;border:none;cursor:pointer;font-size:.85rem;color:#fff}
.btn-confirm{background:var(--success)}.btn-reject{background:var(--danger)}
.empty{text-align:center;padding:3rem;color:var(--muted)}
</style></head><body>
<header><a href="index.html">← Library</a><h2>📥 Incoming Files</h2><button onclick="scan()">🔄 Scan Now</button><nav style="display:flex;gap:.5rem"><a href="catalog.html" style="color:var(--muted);text-decoration:none;padding:.3rem .6rem;font-size:.8rem">📖 Catalog</a><a href="incoming.html" style="color:var(--muted);text-decoration:none;padding:.3rem .6rem;font-size:.8rem">📥 Incoming</a><a href="intelligence.html" style="color:var(--muted);text-decoration:none;padding:.3rem .6rem;font-size:.8rem">🧠 Intel</a><a href="stats.html" style="color:var(--muted);text-decoration:none;padding:.3rem .6rem;font-size:.8rem">📊 Stats</a><a href="recommendations.html" style="color:var(--muted);text-decoration:none;padding:.3rem .6rem;font-size:.8rem">💡 For You</a></nav></header>
<div class="container" id="list"></div>
<script src="api.js"></script>
<script>
async function load() {
    const items = await BC.get('/incoming');
    const el = document.getElementById('list');
    if (!items.length) { el.innerHTML = '<div class="empty">No incoming files. Drop files into the incoming folder.</div>'; return; }
    el.innerHTML = items.map(i => `<div class="item">
        <div class="info"><div class="name">${i.file_name}</div><div class="parsed">Title: ${i.parsed_title||'?'} · Author: ${i.parsed_author||'?'}</div></div>
        <span class="status ${i.status}">${i.status}</span>
        ${i.status === 'pending' ? `<button class="btn-confirm" onclick="confirm('${i.id}')">✓ Confirm</button><button class="btn-reject" onclick="reject('${i.id}')">✕ Reject</button>` : ''}
    </div>`).join('');
}
async function scan() { await BC.post('/incoming/scan'); load(); }
async function confirm(id) { await BC.post('/incoming/' + id + '/confirm'); load(); }
async function reject(id) { await BC.post('/incoming/' + id + '/reject'); load(); }
load();
</script></body></html>
