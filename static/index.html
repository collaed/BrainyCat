<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BrainyCat</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<script src="/static/api.js"></script>
<style>
:root{--pico-font-size:15px}
body{margin:0;padding:0;overflow-x:hidden}
/* Top bar */
.topbar{position:sticky;top:0;z-index:50;background:var(--pico-background-color);border-bottom:1px solid var(--pico-muted-border-color);padding:.5rem 1.5rem;display:flex;align-items:center;gap:1rem}
.topbar h1{font-size:1.1rem;margin:0;white-space:nowrap}
.topbar input[type=search]{max-width:400px;margin:0;height:2.2rem;font-size:.9rem}
.topbar nav{margin-left:auto;display:flex;gap:.5rem;align-items:center}
.topbar nav a{font-size:.8rem;color:var(--pico-muted-color);text-decoration:none;padding:.3rem .5rem;border-radius:4px}
.topbar nav a:hover{color:var(--pico-color);background:var(--pico-muted-border-color)}
.book-count{font-size:.8rem;color:var(--pico-muted-color)}

/* Main layout */
main{padding:1rem 1.5rem;max-width:1600px;margin:0 auto}

/* Controls row */
.controls{display:flex;gap:.5rem;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.controls select{height:2rem;font-size:.8rem;padding:0 .5rem;margin:0}
.controls .spacer{flex:1}
.view-btns button{background:none;border:1px solid var(--pico-muted-border-color);color:var(--pico-muted-color);padding:.3rem .6rem;cursor:pointer;font-size:.8rem}
.view-btns button.active{background:var(--pico-primary);color:#fff;border-color:var(--pico-primary)}
.view-btns button:first-child{border-radius:4px 0 0 4px}
.view-btns button:last-child{border-radius:0 4px 4px 0}

/* Grid view */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem}
.card{background:var(--pico-card-background-color);border-radius:8px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;border:1px solid var(--pico-muted-border-color)}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover;background:#1a1a2e;display:block}
.card .card-cover,.card-cover{width:100%;aspect-ratio:2/3;object-fit:cover;background:#1a1a2e;display:block}
.cover-placeholder{width:100%;aspect-ratio:2/3;overflow:hidden;border-radius:4px}
.continue-cover{width:100px;aspect-ratio:2/3;object-fit:cover;border-radius:6px;display:block}
.continue-cover.cover-placeholder{width:100px;aspect-ratio:2/3;border-radius:6px}
.list-cover{width:28px;height:42px;object-fit:cover;border-radius:3px;display:inline-block;vertical-align:middle}
.list-cover.cover-placeholder{width:28px;height:42px;aspect-ratio:auto;font-size:.7rem !important}
.list-cover.cover-placeholder span{font-size:.7rem !important}
.modal-cover{width:140px;height:210px;object-fit:cover;border-radius:6px;flex-shrink:0}
.modal-cover.cover-placeholder{width:140px;height:210px;aspect-ratio:auto;border-radius:6px}
.card .info{padding:.6rem}
.card .title{font-size:.82rem;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .author{font-size:.72rem;color:var(--pico-muted-color);margin-top:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .meta-row{display:flex;gap:.3rem;margin-top:.4rem;align-items:center}
.badge{font-size:.6rem;padding:.1rem .35rem;border-radius:3px;text-transform:uppercase;font-weight:600}
.badge.epub{background:#164e63;color:#67e8f9}
.badge.pdf{background:#713f12;color:#fbbf24}
.badge.mobi{background:#065f46;color:#6ee7b7}
.badge.mp3,.badge.m4b,.badge.flac{background:#4c1d95;color:#c4b5fd}
.quality{font-size:.65rem;color:var(--pico-muted-color);margin-left:auto}

/* List view */
.list-view{display:none}
.list-view table{width:100%;font-size:.85rem}
.list-view th{font-size:.75rem;text-transform:uppercase;color:var(--pico-muted-color);cursor:pointer;user-select:none;white-space:nowrap}
.list-view th:hover{color:var(--pico-color)}
.list-view td{padding:.4rem .5rem;vertical-align:middle}
.list-view tr{cursor:pointer}
.list-view tr:hover{background:rgba(255,255,255,.03)}
.list-view img{width:28px;height:42px;object-fit:cover;border-radius:3px;vertical-align:middle}

/* Empty state */
.empty{text-align:center;padding:4rem 1rem;color:var(--pico-muted-color)}
.empty h2{font-size:1.2rem;margin-bottom:.5rem}

/* Upload (minimal, bottom-right) */
.upload-fab{position:fixed;bottom:1.5rem;right:1.5rem;z-index:40}
.upload-fab label{display:flex;align-items:center;gap:.4rem;background:var(--pico-primary);color:#fff;padding:.6rem 1rem;border-radius:2rem;cursor:pointer;font-size:.85rem;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.upload-fab label:hover{opacity:.9}
.upload-fab input{display:none}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal-bg.open{display:flex}
.modal-box{background:var(--pico-card-background-color);border-radius:12px;padding:1.5rem;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;position:relative}
.modal-box h2{margin:0 0 .5rem;font-size:1.1rem}
.modal-box .close{position:absolute;top:1rem;right:1.2rem;font-size:1.3rem;cursor:pointer;color:var(--pico-muted-color);background:none;border:none}
.modal-box .book-meta{font-size:.85rem;color:var(--pico-muted-color);margin-bottom:.5rem}
.modal-box .desc{font-size:.85rem;line-height:1.6;margin:.8rem 0;max-height:200px;overflow-y:auto}
.modal-box .tags{display:flex;flex-wrap:wrap;gap:.3rem;margin:.5rem 0}
.modal-box .tags span{background:var(--pico-muted-border-color);padding:.2rem .5rem;border-radius:4px;font-size:.72rem}
.modal-box .actions{display:flex;gap:.5rem;margin-top:1rem;flex-wrap:wrap}
.modal-box .actions button{font-size:.8rem;padding:.4rem .8rem}

/* Loading */
.loading{text-align:center;padding:2rem;color:var(--pico-muted-color)}

/* Responsive */
@media(max-width:600px){
  .topbar{padding:.4rem .8rem;gap:.5rem}
  .topbar h1{font-size:.95rem}
  main{padding:.8rem}
  .grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.6rem}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>🐱 BrainyCat</h1>
  <input type="search" id="search" placeholder="Search books, authors, ISBN…" oninput="debounceSearch()">
  <span class="book-count" id="count"></span>
  <nav>
    <a href="/static/incoming.html" id="incoming-link">📥 Incoming</a>
    <a href="/static/authors.html">Authors</a>
    <a href="/static/series.html">Series</a>
    <a href="/static/metadata-ops.html">Ops</a>
    <a href="/static/filename-history.html">History</a>
    <a href="/static/intelligence.html">Intel</a>
    <a href="/static/stats.html">Stats</a>
    <a href="/static/catalog.html">Catalog</a>
    <a href="#" onclick="logout()">Logout</a>
  </nav>
</div>

<main>
  <div id="continue-reading" style="display:none;margin-bottom:1.5rem">
    <h3 style="font-size:.9rem;color:var(--pico-muted-color);margin-bottom:.5rem">📖 Continue Reading</h3>
    <div id="continue-books" style="display:flex;gap:.8rem;overflow-x:auto;padding-bottom:.5rem"></div>
  </div>

  <div class="controls">
    <select id="sort" onchange="reload()">
      <option value="updated_at">Recent</option>
      <option value="title">Title</option>
      <option value="quality_score">Quality</option>
      <option value="created_at">Added</option>
      <option value="drift">Most changed</option>
    </select>
    <select id="order" onchange="reload()">
      <option value="desc">↓</option>
      <option value="asc">↑</option>
    </select>
    <select id="filter-fmt" onchange="reload()">
      <option value="">All formats</option>
      <option value="epub">EPUB</option>
      <option value="pdf">PDF</option>
      <option value="mobi">MOBI</option>
      <option value="mp3">Audio</option>
    </select>
    <select id="filter-missing" onchange="reload()">
      <option value="">All</option>
      <option value="no_isbn">Missing ISBN</option>
      <option value="no_desc">No description</option>
      <option value="no_cover">No cover</option>
      <option value="no_tags">No tags</option>
      <option value="low_quality">Low quality</option>
    </select>
    <span class="spacer"></span>
    <div class="view-btns">
      <button id="btn-grid" class="active" onclick="setView('grid')">▦</button>
      <button id="btn-list" onclick="setView('list')">☰</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="list-view" id="list-view">
    <table>
      <thead><tr>
        <th></th>
        <th onclick="sortBy('title')">Title</th>
        <th onclick="sortBy('author')">Author</th>
        <th>Format</th>
        <th onclick="sortBy('quality_score')">Q</th>
      </tr></thead>
      <tbody id="list-body"></tbody>
    </table>
  </div>
  <div class="loading" id="loading" style="display:none">Loading…</div>
  <div class="empty" id="empty" style="display:none">
    <h2>No books yet</h2>
    <p>Drop files here or use the + button to upload</p>
  </div>
</main>

<div class="upload-fab">
  <label>+ Upload<input type="file" multiple accept=".epub,.pdf,.mobi,.azw3,.mp3,.m4b,.flac,.ogg" onchange="uploadFiles(this.files)"></label>
</div>

<!-- Book detail modal -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <button class="close" onclick="closeModal()">×</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
let books=[], view='grid', page=0, total=0, loading=false, hasMore=true;
const PAGE=60;
let searchTimer;

function debounceSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(reload,300)}
function reload(){page=0;books=[];hasMore=true;loadBooks()}
function setView(v){view=v;document.getElementById('btn-grid').classList.toggle('active',v==='grid');document.getElementById('btn-list').classList.toggle('active',v==='list');document.getElementById('grid').style.display=v==='grid'?'':'none';document.getElementById('list-view').style.display=v==='list'?'':'none';render()}
function sortBy(f){document.getElementById('sort').value=f;reload()}

async function loadBooks(append=false){
  if(loading)return;loading=true;
  document.getElementById('loading').style.display='block';
  const p=new URLSearchParams({
    sort:document.getElementById('sort').value,
    order:document.getElementById('order').value,
    limit:String(PAGE),offset:String(page*PAGE)
  });
  const q=document.getElementById('search').value;
  if(q)p.set('q',q);
  const fmt=document.getElementById('filter-fmt').value;
  if(fmt)p.set('format',fmt);
  const miss=document.getElementById('filter-missing').value;
  if(miss)p.set('missing',miss);

  try{
    const data=await BC.get('/books?'+p);
    const items=data.books||[];
    if(append)books.push(...items);else books=items;
    total=data.total||0;
    hasMore=items.length>=PAGE;
    document.getElementById('count').textContent=total+' books';
    render();
  }catch(e){
    if(e.status===401)window.location='/static/login.html';
    console.error(e);
  }
  document.getElementById('loading').style.display='none';
  loading=false;
}

function render(){
  const empty=document.getElementById('empty');
  empty.style.display=books.length?'none':'block';
  if(view==='grid')renderGrid();else renderList();
}

function coverUrl(b){
  if(b.cover_path)return'/api/v1/books/'+b.id+'/cover';
  return'';
}
function coverImg(b,cls){
  const url=coverUrl(b);
  if(url)return`<img class="${cls}" src="${url}" alt="" loading="lazy">`;
  // Genre-colored placeholder with full title + author
  const genreColors={fiction:'#3b82f6',romance:'#ef4444',thriller:'#1f2937',fantasy:'#8b5cf6',scifi:'#06b6d4',mystery:'#92400e',literary:'#22c55e',technology:'#1f2937',science:'#22c55e',selfhelp:'#eab308',business:'#3b82f6',history:'#92400e',philosophy:'#8b5cf6',psychology:'#3b82f6'};
  // Use detected_genre from content_signals if available, else first tag
  const genre=((b.detected_genre||((b.tags||[])[0])||'')).toLowerCase().replace(/[^a-z]/g,'');
  const color=genreColors[genre]||'#475569';
  const isFiction=!['technology','science','selfhelp','business','history','philosophy','psychology'].includes(genre);
  const bar=isFiction
    ?`<div style="position:absolute;left:0;top:0;bottom:0;width:5px;background:${color}"></div>`
    :`<div style="position:absolute;left:0;right:0;top:0;height:5px;background:${color}"></div>`;
  const title=esc(b.title||'Untitled');
  const author=esc((b.authors||[]).join(', '));
  return`<div class="${cls} cover-placeholder" style="position:relative;background:#1e293b;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:.6rem;text-align:center;overflow:hidden">${bar}<span style="font-size:.7rem;font-weight:700;color:#e2e8f0;line-height:1.3;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;z-index:1">${title}</span>${author?`<span style="font-size:.6rem;color:#94a3b8;margin-top:.3rem;z-index:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%">${author}</span>`:''}</div>`;
}

function renderGrid(){
  document.getElementById('grid').innerHTML=books.map(b=>`
    <div class="card" onclick="openBook('${b.id}')">
      ${coverImg(b,'card-cover')}
      <div class="info">
        <div class="title">${esc(b.title)}</div>
        <div class="author">${esc((b.authors||[]).join(', ')||'')}</div>
        <div class="meta-row">
          ${(b.formats||[]).map(f=>`<span class="badge ${f}">${f}</span>`).join('')}
          ${b.quality_score?`<span class="quality">${b.quality_score}%</span>`:''}
        </div>
      </div>
    </div>
  `).join('');
}

function renderList(){
  document.getElementById('list-body').innerHTML=books.map(b=>`
    <tr onclick="openBook('${b.id}')">
      <td>${coverImg(b,'list-cover')}</td>
      <td>${esc(b.title)}</td>
      <td style="color:var(--pico-muted-color)">${esc((b.authors||[]).join(', '))}</td>
      <td>${(b.formats||[]).map(f=>`<span class="badge ${f}">${f}</span>`).join('')}</td>
      <td style="color:var(--pico-muted-color)">${b.quality_score||''}</td>
    </tr>
  `).join('');
}

async function openBook(id){
  const b=await BC.get('/books/'+id);
  if(b.error)return;
  document.getElementById('modal-content').innerHTML=`
    <div style="display:flex;gap:1.2rem;flex-wrap:wrap">
      ${coverImg(b,'modal-cover')}
      <div style="flex:1;min-width:200px">
        <h2>${esc(b.title)}</h2>
        <p class="book-meta">${esc((b.authors||[]).join(', '))}${b.publisher?' · '+esc(b.publisher):''}${b.isbn?' · ISBN '+b.isbn:''}</p>
        ${b.description?`<div class="desc">${esc(b.description)}</div>`:''}
        ${b.tags?.length?`<div class="tags">${b.tags.map(t=>`<span>${esc(t)}</span>`).join('')}</div>`:''}
        <div class="actions">
          ${b.formats?.includes('epub')?`<button onclick="window.open('/static/reader.html?id=${b.id}')">📖 Read</button>`:''}
          ${b.formats?.includes('pdf')?`<button onclick="window.open('/api/v1/books/${b.id}/file?format=pdf')">📄 PDF</button>`:''}
          <button onclick="enrich('${b.id}')">✨ Enrich</button>
          <button class="secondary" onclick="deleteBook('${b.id}')">🗑</button>
        </div>
        <details style="margin-top:1rem">
          <summary style="cursor:pointer;font-size:.8rem;color:var(--pico-muted-color)">📋 Operations history</summary>
          <div id="book-ops" style="margin-top:.5rem;font-size:.75rem;max-height:200px;overflow-y:auto"></div>
        </details>
      </div>
    </div>`;
  // Load operations
  BC.get('/books/'+id+'/operations').then(ops=>{
    document.getElementById('book-ops').innerHTML=ops.length?ops.map(o=>`
      <div style="padding:.3rem 0;border-bottom:1px solid var(--pico-muted-border-color)">
        <strong>${o.field}</strong>: <span style="color:var(--pico-del-color);text-decoration:line-through">${esc((o.old_value||'—').substring(0,40))}</span> → <span style="color:var(--pico-ins-color)">${esc((o.new_value||'—').substring(0,40))}</span>
        <span style="float:right;color:var(--pico-muted-color)">${o.source} · ${new Date(o.created_at).toLocaleDateString()}</span>
      </div>
    `).join(''):'<p style="color:var(--pico-muted-color)">No operations recorded yet</p>';
  }).catch(()=>{});
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open')}

async function enrich(id){
  const r=await BC.post('/books/'+id+'/enrich');
  alert(r.enriched?`Enriched from ${r.sources} sources (quality: ${r.quality_score})`:(r.reason||'No results'));
  closeModal();reload();
}

async function deleteBook(id){
  if(!confirm('Delete this book?'))return;
  await BC.del('/books/'+id);
  closeModal();reload();
}

async function uploadFiles(files){
  for(const f of files){
    await BC.upload('/books/upload',f);
  }
  reload();
}

function logout(){document.cookie='brainycat_session=;Max-Age=0;path=/';window.location='/static/login.html'}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// Infinite scroll
window.addEventListener('scroll',()=>{
  if(!hasMore||loading)return;
  if(window.innerHeight+window.scrollY>=document.body.offsetHeight-400){page++;loadBooks(true)}
});

// Init
loadBooks();
BC.get('/incoming/status').then(d=>{if(d.count)document.getElementById('incoming-link').textContent=`📥 ${d.count} incoming`}).catch(()=>{});
// Continue reading shelf
BC.get('/books?sort=updated_at&order=desc&limit=10').then(d=>{
  const inProgress=(d.books||[]).filter(b=>b.quality_score>0);// proxy: books with activity
  if(inProgress.length){
    document.getElementById('continue-reading').style.display='block';
    document.getElementById('continue-books').innerHTML=inProgress.slice(0,6).map(b=>`
      <div style="flex-shrink:0;width:100px;cursor:pointer" onclick="openBook('${b.id}')">
        ${coverImg(b,'continue-cover')}
        <div style="font-size:.65rem;margin-top:.3rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(b.title)}</div>
      </div>
    `).join('');
  }
}).catch(()=>{});
</script>
</body>
</html>
