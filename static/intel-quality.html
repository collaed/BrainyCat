<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BrainyCat — Quality</title>
<style>:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6}*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--bg);color:var(--text)}header{background:var(--surface);padding:.8rem 1.5rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border)}header a{color:var(--muted);text-decoration:none}header h2{flex:1}.container{max-width:900px;margin:0 auto;padding:1.5rem}.card{background:var(--surface);border-radius:8px;padding:.6rem 1rem;margin-bottom:.4rem}.card .title{font-weight:600;font-size:.85rem}.card .detail{font-size:.8rem;color:var(--muted)}.tag{display:inline-block;font-size:.65rem;padding:.1rem .3rem;border-radius:3px;background:#854d0e;color:#fbbf24;margin-right:.2rem}.empty{color:var(--muted);font-style:italic;padding:2rem;text-align:center}</style></head><body>
<header><a href="intelligence.html">← Intelligence</a><h2>🔍 Quality Issues</h2></header>
<div class="container" id="list">Loading...</div>
<script src="api.js"></script>
<script>
async function load(){
    const items=await BC.get('/intelligence/quality');
    if(!items.length){document.getElementById('list').innerHTML='<div class="empty">All books pass quality checks ✓</div>';return;}
    document.getElementById('list').innerHTML=items.map(q=>`<div class="card"><div class="title">${q.title}</div><div class="detail">${q.issues.map(i=>`<span class="tag">${i}</span>`).join('')} · ${q.format}</div></div>`).join('');
}
load();
</script></body></html>
