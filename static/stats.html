<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BrainyCat — Reading Stats</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--bg);color:var(--text)}
header{background:var(--surface);padding:.8rem 1.5rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border)}
header a{color:var(--muted);text-decoration:none}header h2{flex:1}
.container{max-width:1000px;margin:0 auto;padding:1.5rem}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--surface);border-radius:8px;padding:1.2rem;text-align:center}
.stat-card .value{font-size:2rem;font-weight:700;color:var(--accent)}.stat-card .label{font-size:.85rem;color:var(--muted)}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.chart-box{background:var(--surface);border-radius:8px;padding:1rem}
.chart-box h3{margin-bottom:.8rem;font-size:.95rem;color:var(--muted)}
@media(max-width:768px){.charts{grid-template-columns:1fr}}
</style></head><body>
<header><a href="index.html">← Library</a><h2>📊 Reading Statistics</h2><nav style="display:flex;gap:.5rem"><a href="catalog.html" style="color:var(--muted);text-decoration:none;padding:.3rem .6rem;font-size:.8rem">📖 Catalog</a><a href="incoming.html" style="color:var(--muted);text-decoration:none;padding:.3rem .6rem;font-size:.8rem">📥 Incoming</a><a href="intelligence.html" style="color:var(--muted);text-decoration:none;padding:.3rem .6rem;font-size:.8rem">🧠 Intel</a><a href="stats.html" style="color:var(--muted);text-decoration:none;padding:.3rem .6rem;font-size:.8rem">📊 Stats</a><a href="recommendations.html" style="color:var(--muted);text-decoration:none;padding:.3rem .6rem;font-size:.8rem">💡 For You</a></nav></header>
<div class="container">
<div class="stats-grid">
<div class="stat-card"><div class="value" id="total">—</div><div class="label">Books Finished</div></div>
<div class="stat-card"><div class="value" id="streak">—</div><div class="label">Day Streak 🔥</div></div>
</div>
<div class="charts">
<div class="chart-box"><h3>Books per Month</h3><canvas id="monthly"></canvas></div>
<div class="chart-box"><h3>Genre Distribution</h3><canvas id="genres"></canvas></div>
</div>
</div>
<script src="api.js"></script>
<script>
async function load() {
    const s = await BC.get('/stats/overview');
    document.getElementById('total').textContent = s.total_finished || 0;
    document.getElementById('streak').textContent = s.current_streak_days || 0;

    const monthly = s.books_per_month || {};
    new Chart(document.getElementById('monthly'), {
        type: 'bar', data: { labels: Object.keys(monthly), datasets: [{ data: Object.values(monthly), backgroundColor: '#3b82f6' }] },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { color: '#94a3b8' } }, x: { ticks: { color: '#94a3b8' } } } }
    });

    const genres = s.genre_distribution || {};
    const colors = ['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316'];
    new Chart(document.getElementById('genres'), {
        type: 'doughnut', data: { labels: Object.keys(genres), datasets: [{ data: Object.values(genres), backgroundColor: colors }] },
        options: { plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } }
    });
}
load();
</script></body></html>
