<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BrainyCat — Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.login-box{width:100%;max-width:340px;padding:2rem}
.login-box h1{text-align:center;font-size:1.5rem;margin-bottom:1.5rem}
.login-box .error{color:var(--pico-del-color);font-size:.85rem;text-align:center;margin-top:.5rem;display:none}
</style>
</head>
<body>
<div class="login-box">
  <h1>🐱 BrainyCat</h1>
  <form onsubmit="return login(event)">
    <input type="text" id="user" placeholder="Username" required autofocus>
    <input type="password" id="pass" placeholder="Password" required>
    <button type="submit" style="width:100%">Sign in</button>
  </form>
  <p class="error" id="err"></p>
</div>
<script>
async function login(e){
  e.preventDefault();
  const r=await fetch('/api/v1/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('user').value,password:document.getElementById('pass').value})});
  const d=await r.json();
  if(d.ok){window.location='/static/index.html'}
  else{const el=document.getElementById('err');el.textContent=d.detail||'Invalid credentials';el.style.display='block'}
  return false;
}
</script>
</body>
</html>
