<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Library Catalog</title>
<style>
:root{--bg:#fafafa;--surface:#fff;--text:#1a1d23;--muted:#64748b;--accent:#2563eb;--border:#e2e8f0}
@media(prefers-color-scheme:dark){:root{--bg:#0f1115;--surface:#1a1d23;--text:#e2e8f0;--muted:#94a3b8;--accent:#4facfe;--border:#2d333b}}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:'Inter',-apple-system,sans-serif;color:var(--text)}
header{background:var(--surface);padding:1rem 2rem;border-bottom:1px solid var(--border);text-align:center}
h1{margin:0;font-size:1.4rem}
.subtitle{color:var(--muted);font-size:.85rem;margin-top:.25rem}
.search{max-width:500px;margin:1.5rem auto;padding:0 1rem}
.search input{width:100%;padding:.6rem 1rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem;padding:1rem 2rem;max-width:1200px;margin:0 auto}
.book{background:var(--surface);border-radius:8px;overflow:hidden;border:1px solid var(--border);transition:transform .2s}
.book:hover{transform:translateY(-2px)}
.book img{width:100%;aspect-ratio:2/3;object-fit:cover;background:#1a1d23}
.book .info{padding:.5rem}
.book .title{font-size:.75rem;font-weight:600;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.book .author{font-size:.65rem;color:var(--muted);margin-top:.2rem}
.stats{text-align:center;padding:1rem;color:var(--muted);font-size:.8rem}
</style>
</head>
<body>
<header>
<h1>🐱 Library Catalog</h1>
<div class="subtitle">Browse our collection</div>
</header>
<div class="search"><input type="search" id="q" placeholder="Search by title, author, or ISBN..." oninput="search(this.value)"></div>
<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>
<script>
const API = '/api/v1';
async function load(query) {
  const url = query ? `${API}/books?q=${encodeURIComponent(query)}&limit=60` : `${API}/books?limit=60&sort=quality_score&order=desc`;
  const r = await fetch(url);
  const data = await r.json();
  const books = data.books || data || [];
  document.getElementById('stats').textContent = books.length + ' books shown';
  document.getElementById('grid').innerHTML = books.map(b => `
    <div class="book">
      <img src="${b.cover_path || '/static/no-cover.svg'}" alt="" loading="lazy">
      <div class="info">
        <div class="title">${b.title||'Untitled'}</div>
        <div class="author">${b.author||''}</div>
      </div>
    </div>`).join('');
}
let _t;
function search(q) { clearTimeout(_t); _t = setTimeout(() => load(q), 300); }
load('');
</script>
</body>
</html>
