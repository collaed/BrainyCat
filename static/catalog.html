<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BrainyCat — Public Domain Catalog</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--success:#22c55e}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--bg);color:var(--text)}
header{background:var(--surface);padding:.8rem 1.5rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
header a{color:var(--muted);text-decoration:none}header h2{flex:1}
nav{display:flex;gap:.5rem}nav a{padding:.3rem .6rem;font-size:.8rem;color:var(--muted);text-decoration:none}
.container{max-width:1000px;margin:0 auto;padding:1.5rem}
.tabs{display:flex;gap:.5rem;margin-bottom:1rem}
.tabs button{padding:.5rem 1rem;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:.9rem}
.tabs button.active{background:var(--accent);border-color:var(--accent)}
.search-row{display:flex;gap:.5rem;margin-bottom:1rem}
.search-row input{flex:1;padding:.5rem;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.9rem}
.search-row button{padding:.5rem 1rem;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer}
.results{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.8rem}
.item{background:var(--surface);border-radius:8px;padding:1rem;display:flex;gap:.8rem}
.item img{width:60px;height:90px;object-fit:cover;border-radius:4px;background:var(--border);flex-shrink:0}
.item .info{flex:1;min-width:0}
.item h3{font-size:.9rem;margin-bottom:.2rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item .meta{font-size:.8rem;color:var(--muted);margin-bottom:.4rem}
.item button{padding:.3rem .6rem;border-radius:5px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:.8rem;margin-right:.3rem}
.item button.done{background:var(--success)}
.empty{color:var(--muted);text-align:center;padding:2rem}
#status{font-size:.8rem;color:var(--muted);margin-bottom:.5rem}
</style></head><body>
<header><a href="index.html">← Library</a><h2>📖 Public Domain Catalog</h2>
<nav><a href="catalog.html">📖 Catalog</a><a href="incoming.html">📥 Incoming</a><a href="intelligence.html">🧠 Intel</a><a href="stats.html">📊 Stats</a><a href="recommendations.html">💡 For You</a></nav>
</header>
<div class="container">
<div class="tabs">
<button class="active" onclick="setTab('all',this)">🔍 All Sources</button>
<button onclick="setTab('gutenberg',this)">📚 Ebooks</button>
<button onclick="setTab('librivox',this)">🎧 Audiobooks</button>
<button onclick="setTab('textbooks',this)">🎓 Textbooks</button>
<button onclick="setTab('github',this)">💻 GitHub</button>
</div>
<div class="search-row">
<input type="text" id="q" placeholder="Search 120,000+ free books across all sources..." oninput="clearTimeout(window._st);window._st=setTimeout(doSearch,500)">
<select id="lang" onchange="doSearch()" title="Language">
<option value="en">English</option>
<option value="fr">Français</option>
<option value="de">Deutsch</option>
<option value="es">Español</option>
<option value="it">Italiano</option>
<option value="pt">Português</option>
<option value="nl">Nederlands</option>
<option value="sv">Svenska</option>
<option value="zh">中文</option>
<option value="">All languages</option>
</select>
</div>
<div class="search-row">
<input id="q" placeholder="Search 60,000+ public domain ebooks..." onkeydown="if(event.key==='Enter')doSearch()">
<button onclick="doSearch()">Search</button>
</div>
<div id="status"></div>
<div id="results" class="results"></div>
</div>
<script src="api.js"></script>
<script>
let tab='all';
function setTab(t,btn){tab=t;document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');doSearch();}

function renderBooks(books, type) {
    if (!books || !books.length) return '';
    return books.map(b => {
        const authors = (b.authors||[]).map(a => typeof a==='string'?a:a.name||'').join(', ');
        const cover = b.cover_url ? `<img src="${b.cover_url}" onerror="this.style.display='none'">` : '';
        let actions = '';
        if (b.source === 'gutenberg' || b.epub_url) actions = `<button onclick="importGut(${b.gutenberg_id},this)">📥 Import ebook</button>`;
        if (b.source === 'librivox') actions = `<button onclick="importLV('${b.librivox_id}',this)">📥 Import ${b.num_sections||''} ch.</button>`;
        if (b.source === 'standard_ebooks') actions = `<a href="${b.url}" target="_blank" class="btn">🔗 Open</a>`;
        if (b.source === 'oapen' || b.source === 'openstax') actions = `<a href="${b.url}" target="_blank" class="btn">🔗 Open</a>`;
        if (b.source === 'github') actions = `<a href="${b.url}" target="_blank" class="btn">🔗 ${b.stars?'⭐'+b.stars:''}</a>`;
        if (b.source === 'open_textbook_library') actions = `<a href="${b.url}" target="_blank" class="btn">🔗 Open</a>`;
        const audioLink = b.audiobook ? `<div style="font-size:.8rem;color:#3b82f6;margin:4px 0">🎧 ${b.audiobook.title||''} (${b.audiobook.totaltime||'?'}) <button onclick="importLV('${b.audiobook.librivox_id}',this)" style="font-size:.75rem">📥 Audio</button></div>` : '';
        const meta = [authors, b.language, b.totaltime, b.download_count ? b.download_count+' dl' : '', b.license||''].filter(Boolean).join(' · ');
        return `<div class="item">${cover}<div class="info"><h3>${b.title||'?'}</h3><div class="meta">${meta}</div>${audioLink}${b.description?'<div style="font-size:.8rem;color:#94a3b8;margin:4px 0">'+b.description.slice(0,150)+'</div>':''}${actions}</div></div>`;
    }).join('');
}

async function doSearch(){
    const q=document.getElementById('q').value;const el=document.getElementById('results');const st=document.getElementById('status');
    if (!q) { el.innerHTML='<div class="empty">Type to search 120,000+ free books</div>'; st.textContent=''; return; }
    el.innerHTML='<div class="empty">Searching all sources...</div>';

    if (tab === 'all') {
        const data = await BC.get('/catalog/search?q='+encodeURIComponent(q)+'&language='+document.getElementById('lang').value);
        const total = (data.ebooks||[]).length + (data.audiobooks||[]).length + (data.textbooks||[]).length + (data.github||[]).length;
        st.textContent = total + ' results across all sources';
        let html = '';
        if (data.ebooks?.length) html += `<h3 style="margin:1rem 0 .5rem;color:#3b82f6">📚 Ebooks (${data.ebooks.length})</h3>` + renderBooks(data.ebooks);
        if (data.audiobooks?.length) html += `<h3 style="margin:1rem 0 .5rem;color:#22c55e">🎧 Audiobooks (${data.audiobooks.length})</h3>` + renderBooks(data.audiobooks);
        if (data.textbooks?.length) html += `<h3 style="margin:1rem 0 .5rem;color:#f59e0b">🎓 Textbooks (${data.textbooks.length})</h3>` + renderBooks(data.textbooks);
        if (data.github?.length) html += `<h3 style="margin:1rem 0 .5rem;color:#a855f7">💻 GitHub (${data.github.length})</h3>` + renderBooks(data.github);
        el.innerHTML = html || '<div class="empty">No results</div>';
    } else if (tab === 'gutenberg') {
        const data=await BC.get('/catalog/gutenberg/search?q='+encodeURIComponent(q)+'&language='+document.getElementById('lang').value);
        st.textContent=(data?.count||0)+' ebooks';
        el.innerHTML=renderBooks(data?.books)||'<div class="empty">No results</div>';
    } else if (tab === 'librivox') {
        const data=await BC.get('/catalog/librivox/search?title='+encodeURIComponent(q));
        st.textContent=(data?.books||[]).length+' audiobooks';
        el.innerHTML=renderBooks(data?.books)||'<div class="empty">No results</div>';
    } else if (tab === 'textbooks') {
        const [oapen, openstax] = await Promise.all([
            BC.get('/catalog/oapen/search?q='+encodeURIComponent(q)),
            BC.get('/catalog/openstax?q='+encodeURIComponent(q)),
        ]);
        const all = [...(oapen?.books||[]), ...(openstax?.books||[])];
        st.textContent=all.length+' textbooks';
        el.innerHTML=renderBooks(all)||'<div class="empty">No results</div>';
    } else if (tab === 'github') {
        const data=await BC.get('/catalog/github/search?q='+encodeURIComponent(q));
        st.textContent=(data?.count||0)+' repos';
        el.innerHTML=renderBooks(data?.books)||'<div class="empty">No results</div>';
    }
}
async function importGut(id,btn){btn.disabled=true;btn.textContent='⏳...';const r=await BC.post('/catalog/gutenberg/'+id+'/import');btn.textContent=r.title?'✅ '+r.title:'❌ '+(r.error||'');btn.classList.add('done');}
async function importLV(id,btn){btn.disabled=true;btn.textContent='⏳ Downloading...';const r=await BC.post('/catalog/librivox/'+id+'/import');btn.textContent=r.book_id?'✅ '+r.chapters_downloaded+' chapters':'❌ '+(r.error||'');btn.classList.add('done');}
doSearch();
</script></body></html>
